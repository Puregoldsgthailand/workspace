<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#FAF7F1">
<title>Puregold.sg — Internal Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#FAFAF7;
  --surface:#FFFFFF;
  --card:#FFFFFF;
  --soft:#F5F3EE;
  --line:#E8E4DA;
  --line-strong:#D6CFBE;
  --text:#1A1A1A;
  --text-dim:#5A5A5A;
  --text-muted:#9B9B9B;
  --gold:#C9A24A;
  --gold-bright:#D9B566;
  --gold-dark:#9B7C2C;
  --gold-soft:#F7EFD9;
  --silver:#9CA3AF;
  --red:#D44D3A;
  --red-soft:#FCE9E5;
  --green:#5A8E3F;
  --green-soft:#E9F2E0;
  --blue:#4A7CA8;
  --blue-soft:#E5EEF6;
  --orange:#D89344;
  --orange-soft:#FAEEDA;
  --radius:12px;
  --radius-sm:8px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 4px 16px rgba(120,100,60,0.08);
  --shadow-lg:0 12px 40px rgba(120,100,60,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.5;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
h1,h2,h3,h4{font-weight:600;letter-spacing:-0.02em;color:var(--text)}
.gold{color:var(--gold-dark)}
.dim{color:var(--text-dim)}
.muted{color:var(--text-muted)}
.logo-img{height:32px;width:auto;display:block}

/* ===== LOGIN ===== */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
#loginScreen::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 30%,rgba(201,162,74,0.08) 0%,transparent 50%),
    radial-gradient(circle at 80% 70%,rgba(201,162,74,0.05) 0%,transparent 50%);
  pointer-events:none;
}
.login-box{position:relative;max-width:480px;width:100%;text-align:center}
.login-logo{height:54px;margin:0 auto 8px;display:block}
.login-tag{font-size:11px;letter-spacing:0.3em;color:var(--gold-dark);text-transform:uppercase;margin-bottom:40px;font-weight:600}
.login-title{font-size:36px;font-weight:600;letter-spacing:-0.03em;margin-bottom:8px;line-height:1.1}
.login-title em{font-style:normal;color:var(--gold-dark)}
.login-sub{color:var(--text-dim);margin-bottom:36px;font-size:15px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.role-btn{padding:18px 16px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);text-align:left;transition:all .2s;box-shadow:var(--shadow-sm)}
.role-btn:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow)}
.role-btn .role-name{font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px}
.role-btn .role-desc{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em;font-weight:500}
.password-screen{display:none}
.password-screen.show{display:block}
.password-back{font-size:13px;color:var(--text-muted);margin-bottom:18px;cursor:pointer}
.password-back:hover{color:var(--text)}
.password-role-name{font-size:22px;font-weight:600;margin-bottom:24px}
.password-input{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:var(--radius);font-size:15px;letter-spacing:0.1em;text-align:center;background:var(--card);transition:border-color .15s}
.password-input:focus{outline:none;border-color:var(--gold)}
.password-error{color:var(--red);font-size:13px;margin-top:10px;min-height:16px}
.login-error-shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ===== APP LAYOUT ===== */
#app{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:50;background:rgba(250,250,247,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.topbar-left{display:flex;align-items:center;gap:14px}
.role-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;background:var(--gold-soft);border:1px solid var(--line-strong);border-radius:100px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold-dark);font-weight:600}
.role-pill .dot{width:6px;height:6px;background:var(--gold);border-radius:50%}
.topbar-right{display:flex;align-items:center;gap:10px}
.gold-ticker{display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--card);border:1px solid var(--line);border-radius:100px;font-size:12px;cursor:pointer;transition:border-color .15s}
.gold-ticker:hover{border-color:var(--gold)}
.gold-ticker .item{display:flex;align-items:center;gap:6px;white-space:nowrap}
.gold-ticker .item + .item{padding-left:10px;border-left:1px solid var(--line)}
.gold-ticker .label{color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;font-weight:600}
.gold-ticker .price{color:var(--gold-dark);font-weight:600;font-variant-numeric:tabular-nums}
.gold-ticker .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;transition:all .15s;position:relative;color:var(--text-dim)}
.icon-btn:hover{background:var(--soft);border-color:var(--gold);color:var(--text)}
.icon-btn .badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:600;padding:0 4px}

.shell{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 60px)}
.sidebar{border-right:1px solid var(--line);padding:18px 12px;background:var(--surface)}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-muted);margin:14px 12px 8px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);color:var(--text-dim);font-size:14px;font-weight:500;transition:all .12s;cursor:pointer;width:100%;text-align:left;margin-bottom:1px}
.nav-item:hover{background:var(--soft);color:var(--text)}
.nav-item.active{background:var(--gold-soft);color:var(--gold-dark);font-weight:600}
.nav-item .nav-dot{width:5px;height:5px;border-radius:50%;background:var(--text-muted);transition:all .15s;flex-shrink:0}
.nav-item.active .nav-dot{background:var(--gold)}
.nav-badge{margin-left:auto;font-size:10px;background:var(--red);color:#fff;padding:1px 6px;border-radius:8px;font-weight:600}

.main{padding:28px 32px 80px;max-width:1400px;width:100%}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;gap:20px;flex-wrap:wrap}
.page-title{font-size:30px;font-weight:600;letter-spacing:-0.025em;line-height:1.1}
.page-title em{font-style:normal;color:var(--gold-dark)}
.page-sub{color:var(--text-muted);font-size:11px;margin-bottom:6px;letter-spacing:0.18em;text-transform:uppercase;font-weight:600}

/* ===== CARDS / GRID ===== */
.grid{display:grid;gap:14px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-5{grid-template-columns:repeat(5,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;transition:all .15s;box-shadow:var(--shadow-sm)}
.card:hover{box-shadow:var(--shadow)}
.card-title{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px;font-weight:600}
.card-value{font-size:30px;font-weight:600;letter-spacing:-0.02em;line-height:1.1;color:var(--text)}
.card-value em{color:var(--gold-dark);font-style:normal}
.card-meta{margin-top:6px;font-size:12px;color:var(--text-dim)}

.section{margin-top:32px}
.section-title{font-size:18px;font-weight:600;letter-spacing:-0.02em;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.section-title::after{content:'';flex:1;height:1px;background:var(--line);margin-left:8px}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:all .15s;border:1px solid transparent;letter-spacing:0.01em;white-space:nowrap}
.btn-primary{background:var(--gold);color:#fff}
.btn-primary:hover{background:var(--gold-dark)}
.btn-ghost{background:var(--card);border-color:var(--line);color:var(--text-dim)}
.btn-ghost:hover{background:var(--soft);color:var(--text);border-color:var(--gold)}
.btn-danger{background:var(--red-soft);color:var(--red);border-color:transparent}
.btn-danger:hover{background:#F8D7D0}
.btn-sm{padding:6px 12px;font-size:12px}

/* ===== INPUTS ===== */
.input,select.input,textarea.input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;color:var(--text);transition:border-color .15s}
.input:focus{outline:none;border-color:var(--gold)}
textarea.input{resize:vertical;min-height:80px;font-family:inherit}
.label{display:block;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px;font-weight:600}
.input-row{display:flex;gap:10px;flex-wrap:wrap}

/* ===== TASK BOARD ===== */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.kanban-col{background:var(--soft);border:1px solid var(--line);border-radius:var(--radius);padding:14px;min-height:300px}
.kanban-col h4{font-size:11px;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);margin-bottom:14px;display:flex;justify-content:space-between;font-weight:700}
.task-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px;margin-bottom:10px;cursor:pointer;transition:all .15s;position:relative;box-shadow:var(--shadow-sm)}
.task-card:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:var(--shadow)}
.task-card.done{opacity:0.6}
.task-card.done .task-title{text-decoration:line-through}
.task-card .task-title{font-size:13.5px;font-weight:500;margin-bottom:8px;line-height:1.4;color:var(--text)}
.task-card .task-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11px}
.task-tag{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
.tag-low{background:var(--green-soft);color:var(--green)}
.tag-mid{background:var(--orange-soft);color:var(--orange)}
.tag-high{background:var(--red-soft);color:var(--red)}
.task-assignee{color:var(--text-dim);font-size:11px;font-weight:500}
.task-due{color:var(--text-muted);font-size:11px}
.task-actions{position:absolute;top:8px;right:8px;display:none;gap:4px}
.task-card:hover .task-actions{display:flex}
.task-actions button{width:24px;height:24px;border-radius:6px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;line-height:1}
.task-actions button:hover{background:var(--red-soft);color:var(--red)}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(20,20,20,0.45);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal h3{font-size:22px;margin-bottom:20px;font-weight:600}
.modal .form-row{margin-bottom:14px}
@media (max-width:640px){
  .modal-bg{padding:0;align-items:flex-end}
  .modal{border-radius:16px 16px 0 0;max-width:100%;width:100%;max-height:92vh;padding:20px 16px 24px;animation:slideUp .25s ease-out}
  .modal h3{font-size:18px;margin-bottom:14px}
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ===== SHIPMENT PHASES ===== */
.phase-progress{display:flex;align-items:center;gap:0;margin-bottom:24px;padding:0 8px}
.phase-step{flex:1;display:flex;align-items:center}
.phase-circle{width:40px;height:40px;border-radius:50%;background:var(--card);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-muted);font-weight:600;flex-shrink:0;transition:all .25s}
.phase-circle.active{background:var(--gold);border-color:var(--gold);color:#fff}
.phase-circle.done{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.phase-line{flex:1;height:2px;background:var(--line);margin:0 4px}
.phase-line.done{background:var(--gold)}
.phase-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.phase-card.active{border-color:var(--gold);background:linear-gradient(180deg,var(--gold-soft) 0%,var(--card) 30%)}
.phase-card h4{font-size:16px;margin-bottom:4px;font-weight:600}
.phase-card .checklist{margin-top:14px}
.checklist-item{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px}
.checklist-item input[type=checkbox]{accent-color:var(--gold);width:16px;height:16px;cursor:pointer}
.checklist-item.done label{text-decoration:line-through;color:var(--text-muted)}

/* ===== SALES ===== */
.sale-row{display:grid;grid-template-columns:1.6fr 1fr 1fr 0.8fr 90px 60px;gap:10px;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:6px;font-size:13px}
.sale-row .product-name{font-weight:600}
.sale-row .channel-tag{font-size:10px;padding:2px 8px;background:var(--soft);border-radius:100px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;display:inline-block;font-weight:600}
.channel-tag.online{color:var(--blue);background:var(--blue-soft)}
.channel-tag.atm{color:var(--gold-dark);background:var(--gold-soft)}
.payment-tag{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;display:inline-block}
.payment-goldpay{background:#FCEED9;color:#9B7C2C}
.payment-card{background:#E5EEF6;color:#3A6B98}
.payment-qr{background:#E9F2E0;color:#4A7C30}

/* ===== CALENDAR ===== */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;max-width:100%}
.cal-day-header{padding:8px;text-align:center;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.15em;font-weight:700;min-width:0;overflow:hidden}
.cal-cell{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px;min-height:80px;font-size:12px;cursor:pointer;transition:all .12s;position:relative;min-width:0;overflow:hidden}
.cal-cell:hover{border-color:var(--gold)}
.cal-cell.other-month{opacity:0.4}
.cal-cell.today{border-color:var(--gold);background:var(--gold-soft)}
.cal-cell .cal-date{font-weight:600;font-size:13px;margin-bottom:4px}
.cal-cell .cal-event{font-size:10px;padding:2px 5px;background:var(--soft);border-radius:4px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-left:2px solid var(--gold);max-width:100%}
.cal-event.shipment{border-left-color:var(--blue)}
.cal-event.task{border-left-color:var(--orange)}
.cal-event.office-poon{border-left-color:#D17A8E}
.cal-event.office-jump{border-left-color:#5A8FC2}
.cal-event.office-carly{border-left-color:#8B6FC9}
.cal-event.office-guest{border-left-color:#5AAB80}

/* ===== INVENTORY ===== */
.inv-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.inv-table th{text-align:left;padding:12px 14px;font-size:10px;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);background:var(--soft);border-bottom:1px solid var(--line);font-weight:700}
.inv-table td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13px}
.inv-table tr:last-child td{border-bottom:none}
.inv-table tr:hover td{background:var(--soft)}
.stock-status{font-size:10px;padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.stock-status.ok{background:var(--green-soft);color:var(--green)}
.stock-status.low{background:var(--orange-soft);color:var(--orange)}
.stock-status.critical{background:var(--red-soft);color:var(--red)}

/* ===== MEDIA / FOLDERS ===== */
.folder-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.folder{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;text-align:center;transition:all .2s;cursor:pointer;text-decoration:none;color:var(--text);display:block;box-shadow:var(--shadow-sm)}
.folder:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:var(--shadow)}
.folder-icon{width:52px;height:52px;margin:0 auto 14px;background:linear-gradient(135deg,var(--gold-bright) 0%,var(--gold) 100%);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700}
.folder-name{font-size:16px;font-weight:600;margin-bottom:4px}
.folder-meta{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em;font-weight:500}

/* ===== ATM ===== */
.atm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.atm-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:all .15s}
.atm-card:hover{box-shadow:var(--shadow)}
.atm-name{font-size:18px;font-weight:600;margin-bottom:4px}
.atm-status{display:inline-flex;align-items:center;gap:6px;font-size:10px;padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:12px}
.atm-status .pulse{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
.atm-status.online{background:var(--green-soft);color:var(--green)}
.atm-status.online .pulse{background:var(--green)}
.atm-status.maintenance{background:var(--orange-soft);color:var(--orange)}
.atm-status.maintenance .pulse{background:var(--orange)}
.atm-status.offline{background:var(--red-soft);color:var(--red)}
.atm-status.offline .pulse{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.atm-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.atm-stat{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:600}
.atm-stat-val{font-size:16px;color:var(--text);margin-top:2px;display:block;font-weight:600;letter-spacing:-0.01em}
.atm-payments{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}

/* ===== IDEAS ===== */
.idea-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.idea-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px}
.idea-title{font-size:16px;font-weight:600}
.idea-meta{font-size:11px;color:var(--text-muted)}
.idea-body{font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.6}
.idea-vote{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--soft);border:1px solid var(--line);border-radius:100px;font-size:12px;cursor:pointer;transition:all .15s;font-weight:600}
.idea-vote:hover{border-color:var(--gold)}
.idea-vote.voted{background:var(--gold);color:#fff;border-color:var(--gold)}

/* ===== AI HELPER ===== */
.ai-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold-bright) 0%,var(--gold) 100%);box-shadow:0 8px 28px rgba(201,162,74,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s;z-index:60;color:#fff}
.ai-fab:hover{transform:scale(1.08)}

/* ===== LEARNING LIBRARY ===== */
.lib-modules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;margin-bottom:32px}
.lib-mod-card{cursor:pointer;position:relative;padding:28px 26px 24px;transition:border-color .2s,box-shadow .2s,transform .2s;overflow:hidden}
.lib-mod-card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(201,162,74,0.12);transform:translateY(-2px)}
.lib-mod-card.lib-mod-active{border-color:var(--gold);background:#FDFBF7;box-shadow:0 4px 16px rgba(201,162,74,0.15)}
.lib-mod-card.lib-mod-active::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold-bright) 100%)}
.lib-mod-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.3}
.lib-mod-desc{font-size:13px;color:var(--text-dim);line-height:1.65;min-height:42px}
@media (max-width:600px){
  .lib-modules-grid{grid-template-columns:1fr;gap:14px}
  .lib-mod-card{padding:22px 20px 18px}
  .lib-mod-title{font-size:16px}
  .lib-mod-desc{min-height:0}
}
.ai-panel{position:fixed;bottom:96px;right:24px;width:360px;max-width:calc(100vw - 32px);height:520px;max-height:calc(100vh - 140px);background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:60;display:none;flex-direction:column;overflow:hidden}
.ai-panel.show{display:flex}
.ai-header{padding:16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.ai-title{font-size:16px;font-weight:600}
.ai-msgs{flex:1;overflow-y:auto;padding:16px;display:block}
.ai-msg{padding:10px 14px;border-radius:14px;max-width:85%;font-size:13px;line-height:1.55;display:block;width:fit-content;width:-moz-fit-content;margin-bottom:10px;word-wrap:break-word;overflow-wrap:break-word}
.ai-msg.user{background:var(--gold);color:#fff;border-bottom-right-radius:4px;margin-left:auto;margin-right:0;text-align:left}
.ai-msg.bot{background:var(--soft);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--line);max-width:92%;margin-left:0;margin-right:auto;text-align:left}
.ai-msg.bot strong{color:var(--text);font-weight:700}
.ai-msg.bot em{font-style:italic;color:var(--text-dim)}
.ai-input{padding:12px;border-top:1px solid var(--line);display:flex;gap:8px}
.ai-input input{flex:1;background:var(--soft);border:1px solid var(--line);border-radius:100px;padding:10px 16px;color:var(--text);font-size:13px}
.ai-input input:focus{outline:none;border-color:var(--gold)}
.ai-input button{width:38px;height:38px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px}

/* ===== TOAST ===== */
.toast-stack{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:300;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;min-width:240px;box-shadow:var(--shadow-lg);animation:slideIn .3s ease-out;pointer-events:auto;color:var(--text)}
.toast.error{border-left-color:var(--red)}
.toast.success{border-left-color:var(--green)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===== EDITABLE LABELS ===== */
.editable{cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .15s;padding:0 2px}
.manager-mode .editable:hover{border-bottom-color:var(--gold)}
.editable[contenteditable=true]{outline:none;border-bottom-color:var(--gold);background:var(--gold-soft)}

/* ===== EMPTY ===== */
.empty{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:13px}
.empty .empty-title{font-size:16px;font-weight:600;color:var(--text-dim);margin-bottom:6px}

/* ===== BOTTOM NAV (scrollable on mobile) ===== */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--line);padding:6px 0;z-index:50;align-items:center;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.bottom-nav::-webkit-scrollbar{display:none}
.bottom-nav button{flex:0 0 auto;min-width:64px;padding:8px 10px;font-size:10px;color:var(--text-muted);text-align:center;text-transform:uppercase;letter-spacing:0.04em;line-height:1.2;font-weight:600;white-space:nowrap}
.bottom-nav button.active{color:var(--gold-dark)}
.bottom-nav .bn-icon{display:block;font-size:13px;font-weight:700;margin-bottom:3px}
.bottom-nav .bn-fade{position:fixed;bottom:0;width:24px;height:50px;pointer-events:none;z-index:51;display:none}
@media (max-width:900px){
  .bottom-nav .bn-fade{display:block}
  .bottom-nav .bn-fade-l{left:0;background:linear-gradient(to right,rgba(255,255,255,0.95),transparent)}
  .bottom-nav .bn-fade-r{right:0;background:linear-gradient(to left,rgba(255,255,255,0.95),transparent)}
}

/* ===== RESPONSIVE — Tablet (≤900px) ===== */
@media (max-width:900px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:18px 14px 90px;max-width:100vw;overflow-x:hidden}
  /* Universal mobile overflow prevention */
  .main .card, .main .section{max-width:100%;overflow-wrap:break-word;word-wrap:break-word}
  .main table{max-width:100%}
  .main pre, .main code{white-space:pre-wrap;word-break:break-all;max-width:100%}
  /* Long URLs / IDs */
  .main a{word-break:break-word}
  .topbar{padding:10px 14px;gap:10px;flex-wrap:wrap}
  .topbar .topbar-right{order:3;width:100%;justify-content:flex-end;margin-top:4px}
  .topbar .gold-ticker{flex:1;padding:5px 10px;gap:6px;font-size:11px;min-width:0;overflow-x:auto;overflow-y:hidden;justify-content:flex-start;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .topbar .gold-ticker::-webkit-scrollbar{display:none}
  .topbar .gold-ticker .label{font-size:9px;letter-spacing:0.05em}
  .topbar .gold-ticker .item{gap:4px;flex-shrink:0}
  .topbar .gold-ticker .item + .item{padding-left:6px}
  .topbar .gold-ticker .live-dot{flex-shrink:0}
  .grid-4,.grid-5{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
  .kanban{grid-template-columns:1fr !important}
  .folder-grid{grid-template-columns:repeat(2,1fr)}
  .atm-grid{grid-template-columns:1fr}
  /* AI page on mobile — full height */
  .ai-shell{height:calc(100vh - 60px);max-height:calc(100vh - 60px)}
  .ai-msg{max-width:90% !important;font-size:14px;width:fit-content;width:-moz-fit-content;text-align:left}
  .ai-msg.bot{max-width:96% !important}
  .page-title{font-size:22px}
  .page-header{flex-wrap:wrap;gap:12px}
  .login-title{font-size:28px}
  .role-grid{grid-template-columns:1fr 1fr}
  .bottom-nav{display:flex}
  /* Đẩy AI Helper FAB lên cao hơn bottom nav trên mobile */
  .ai-fab{bottom:84px;right:16px;width:50px;height:50px}
  .sale-row{grid-template-columns:1fr 1fr !important;gap:6px;font-size:12px;padding:10px 12px}
  .sale-row > div:nth-child(n+5){grid-column:span 2}
  .cal-cell{min-height:60px;padding:4px;font-size:10px}
  .cal-cell .cal-event{font-size:9px;padding:1px 3px;margin-bottom:1px}
  .cal-cell .cal-date{font-size:11px}
  /* Modal: full width on mobile */
  #modalContent{max-width:calc(100vw - 24px);margin:12px;padding:20px 18px;max-height:calc(100vh - 24px);overflow-y:auto}
  /* Form rows stack on small screens */
  .input-row{flex-direction:column;gap:0}
  .input-row .form-row{flex:1 1 auto}
  /* Inv table — more compact */
  .inv-table th, .inv-table td{padding:8px 6px;font-size:12px}
  /* Phase progress smaller */
  .phase-circle{width:24px;height:24px;font-size:11px}
  /* Card padding reduced */
  .card{padding:14px}
  .section-title{font-size:14px}
  /* Page subtitle */
  .page-sub{font-size:11px}
  /* Buttons more tap-friendly */
  .btn{min-height:38px}
  .btn-sm{min-height:30px}
  /* Bottom nav fade indicators */
  .bottom-nav .bn-fade{display:block}
  .bottom-nav .bn-fade-l{left:0;background:linear-gradient(to right,rgba(255,255,255,0.95),transparent)}
  .bottom-nav .bn-fade-r{right:0;background:linear-gradient(to left,rgba(255,255,255,0.95),transparent)}
}

/* ===== Phone (≤640px) ===== */
@media (max-width:640px){
  /* iOS auto-zooms on focus if input font < 16px — force 16px on touch */
  .input, select.input, textarea.input{font-size:16px;padding:11px 13px}
  .topbar{flex-wrap:wrap;padding:8px 12px;gap:8px}
  .topbar .logo-img{height:24px}
  .topbar .role-pill{font-size:10px;padding:3px 10px}
  .main{padding:14px 12px 90px}
  .page-title{font-size:20px}
  .page-sub{font-size:10px;letter-spacing:0.08em}
  .page-header{margin-bottom:14px}
  .card-value{font-size:24px}
  .card-title{font-size:11px}
  /* Folder grid 1 column */
  .folder-grid{grid-template-columns:1fr}
  /* ATM card padding */
  .atm-card{padding:16px}
  .atm-name{font-size:16px}
  /* Task card */
  .task-card{padding:14px}
  .task-title{font-size:14px}
  .task-meta{font-size:11px}
  /* Calendar specific */
  .cal-cell{min-height:50px;padding:3px;font-size:9px}
  .cal-cell .cal-event{font-size:8px;padding:1px 2px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal-day-header{font-size:10px;padding:6px 0}
  /* Modal */
  #modalContent{padding:16px 14px}
  /* Buttons */
  .btn{padding:8px 14px;font-size:13px}
  .btn-sm{padding:5px 10px;font-size:11px}
  /* Sale row — stack everything but keep edit/delete on right */
  .sale-row{grid-template-columns:1fr !important;padding:10px 12px;gap:4px}
  .sale-row > div{grid-column:span 1 !important}
  /* Sales filter inputs: don't squeeze when wrapping */
  .sales-filter-bar input[type="date"],
  .sales-filter-bar select{width:100% !important;flex:1 1 100% !important}
  /* Form rows with multiple inputs: stack */
  .input-row{flex-direction:column}
  .input-row > .form-row{flex:1 1 auto !important;width:100%}
  /* Library + Case Study cards full width */
  .lib-card, .case-card{padding:14px}
  /* Shipment card */
  .phase-progress{gap:6px}
  .phase-circle{width:22px;height:22px;font-size:10px}
  .phase-line{flex:1}
  .phase-card{padding:12px}
  /* Inventory table — make readable */
  .inv-table{font-size:11px}
  .inv-table th, .inv-table td{padding:6px 4px}
  /* Section spacing */
  .section{margin-bottom:18px}
  /* Bottom nav buttons smaller */
  .bottom-nav button{min-width:54px;padding:6px 8px;font-size:9px}
  .bottom-nav .bn-icon{font-size:11px}
}

/* ===== Small phone (≤400px) ===== */
@media (max-width:400px){
  .grid-4,.grid-5{grid-template-columns:1fr 1fr}
  .role-grid{grid-template-columns:1fr}
  .gold-ticker{font-size:10px;padding:4px 8px;gap:5px}
  .gold-ticker .label{font-size:8px}
  .gold-ticker .item + .item{padding-left:5px}
  .gold-ticker .live-dot{width:5px;height:5px}
  .main{padding:12px 10px 86px}
  .topbar{padding:6px 10px}
  .topbar .role-pill{display:none}
  .topbar .logo-img{height:22px}
  .page-title{font-size:18px}
  .card{padding:12px}
  .card-value{font-size:20px}
  /* Modal full edge */
  #modalContent{margin:8px;padding:14px 12px;max-width:calc(100vw - 16px)}
  /* Tighter calendar */
  .cal-cell{min-height:44px;padding:2px}
  .cal-cell .cal-event{font-size:7px;padding:0 2px}
  .cal-cell .cal-date{font-size:10px}
  /* Phase steps */
  .phase-circle{width:20px;height:20px;font-size:9px}
  /* Inv table compact */
  .inv-table th, .inv-table td{padding:5px 3px;font-size:10px}
  /* Bottom nav even smaller */
  .bottom-nav button{min-width:48px;padding:6px 6px;font-size:8px}
  /* FAB nhỏ hơn cho điện thoại nhỏ */
  .ai-fab{bottom:78px;right:14px;width:46px;height:46px}
  /* Page-header buttons wrap nicely */
  .page-header > div:last-child{width:100%}
  .page-header .btn{flex:1}
}

/* ===== Landscape phone (helps Pro Max in landscape) ===== */
@media (max-width:900px) and (orientation:landscape) and (max-height:500px){
  .topbar{padding:6px 12px}
  .main{padding:12px 14px 80px}
  .page-title{font-size:20px}
  .bottom-nav{padding:4px 0}
  .bottom-nav button{padding:5px 8px}
}

/* ===== UTILS ===== */
.flex{display:flex}
.gap-8{gap:8px}
.gap-12{gap:12px}
.gap-16{gap:16px}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.mb-24{margin-bottom:24px}
.mt-16{margin-top:16px}
.text-center{text-align:center}
.hidden{display:none !important}
.between{justify-content:space-between}
.items-center{align-items:center}
.items-start{align-items:flex-start}
.flex-wrap{flex-wrap:wrap}
.w-full{width:100%}
.scroll-x{overflow-x:auto}

.page{animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dark)}
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen">
  <div class="login-box">
    <!-- Role Selection -->
    <div id="roleSelectScreen">
      <img id="loginLogo" class="login-logo" alt="Puregold.sg">
      <div class="login-tag">Internal Workspace</div>
      <h1 class="login-title">Welcome <em>back</em></h1>
      <p class="login-sub">Choose your role to continue</p>
      <div class="role-grid" id="roleGrid"></div>
    </div>

    <!-- Password Screen -->
    <div id="passwordScreen" class="password-screen">
      <img class="login-logo" id="loginLogo2" alt="Puregold.sg">
      <div class="login-tag">Internal Workspace</div>
      <div class="password-back" onclick="backToRoleSelect()">← Back</div>
      <div class="password-role-name">Sign in as <span id="pwdRoleName" style="color:var(--gold-dark)"></span></div>
      <input id="pwdInput" type="password" class="password-input" placeholder="Enter password" autocomplete="current-password">
      <div class="password-error" id="pwdError"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:14px;padding:14px" onclick="submitPassword()">Sign in</button>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <img id="topLogo" class="logo-img" alt="Puregold.sg">
      <span class="role-pill"><span class="dot"></span><span id="currentRole">Manager</span></span>
      <span id="syncDot" style="display:none;width:8px;height:8px;border-radius:50%;background:var(--green);" title="Cloud sync"></span>
    </div>
    <div class="topbar-right">
      <div class="gold-ticker" id="goldTicker" title="Click for details">
        <span class="live-dot" id="liveDot"></span>
        <div class="item"><span class="label">Gold/g</span><span class="price" id="goldPrice">…</span></div>
        <div class="item"><span class="label">Gold/baht</span><span class="price" id="goldBahtPrice">…</span></div>
        <div class="item"><span class="label">Silver/g</span><span class="price" id="silverPrice">…</span></div>
      </div>
      <button class="icon-btn" id="notifBtn" title="Notifications">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span class="badge hidden" id="notifBadge">0</span>
      </button>
      <button class="icon-btn" id="logoutBtn" title="Logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main" id="main"></main>
  </div>

  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<!-- AI Helper -->
<button class="ai-fab" id="aiFab" title="AI Helper">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</button>
<div class="ai-panel" id="aiPanel">
  <div class="ai-header">
    <div class="ai-title">AI Helper</div>
    <button class="icon-btn" id="aiClose" style="width:28px;height:28px;font-size:18px">×</button>
  </div>
  <div class="ai-msgs" id="aiMsgs"></div>
  <div class="ai-input">
    <input type="text" id="aiInput" placeholder="Ask about tasks, stock, sales...">
    <button id="aiSend">→</button>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>

<script>
/* ============================================================
   PUREGOLD INTERNAL WORKSPACE — single-file app v2

function applyAppConfig(state){
  // Always force the hardcoded cloud sync + Gemini config — every device uses the same backend.
  // This means staff don't need to set up cloud sync manually on their devices.
  if(typeof APP_CONFIG !== 'undefined' && APP_CONFIG.cloudSync){
    const prevLastSyncAt = state.cloudSync?.lastSyncAt || 0;
    const prevLastPushAt = state.cloudSync?.lastPushAt || 0;
    state.cloudSync = {
      enabled: APP_CONFIG.cloudSync.enabled,
      binId: APP_CONFIG.cloudSync.binId,
      accessKey: APP_CONFIG.cloudSync.accessKey,
      lastSyncAt: prevLastSyncAt,

  if(typeof APP_CONFIG !== 'undefined' && APP_CONFIG.geminiApiKey){
    state.geminiApiKey = APP_CONFIG.geminiApiKey;
  }
  return state;
}

// App version — bumped whenever we need to invalidate stale localStorage on user devices
const APP_VERSION = '5.18';
const VERSION_KEY = 'puregold_app_version';

let S = loadState();
function loadState(){
  try{
    // === Version migration: if old version (or none), reset globalUpdatedAt to force fresh cloud pull ===
    // This avoids the "phone with stale data pushes back over cloud" rollback bug after deploy.
    const storedVersion = localStorage.getItem(VERSION_KEY);
    const isUpgrade = storedVersion !== APP_VERSION;
    if(isUpgrade){
      console.log('[Migration] App version changed from', storedVersion || '(none)', 'to', APP_VERSION, '— resetting sync timestamps to force cloud pull');
      try{
        const oldRaw = localStorage.getItem(KEY);
        if(oldRaw){
          const oldData = JSON.parse(oldRaw);
          // Force this device to be treated as "never saved" so it never overwrites cloud
          oldData.globalUpdatedAt = 0;
          if(oldData.cloudSync){
            oldData.cloudSync.lastSyncAt = 0;
            oldData.cloudSync.lastPushAt = 0;
          }
          localStorage.setItem(KEY, JSON.stringify(oldData));
        }
      }catch(e){ console.warn('Migration failed (will use fresh state):', e); }
      localStorage.setItem(VERSION_KEY, APP_VERSION);
    }

    const raw = localStorage.getItem(KEY);
    if(!raw) return applyAppConfig(JSON.parse(JSON.stringify(DEFAULT_STATE)));
    const parsed = JSON.parse(raw);
    const merged = {...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...parsed};
    // Make sure new fields exist
    if(!merged.passwords) merged.passwords = JSON.parse(JSON.stringify(DEFAULT_STATE.passwords));
    // Ensure all employees have passwords
    merged.employees.forEach(e=>{
      if(!merged.passwords[e]) merged.passwords[e] = e.toLowerCase()+'123';
    });
    // Ensure ATMs have payment methods
    merged.atms.forEach(a=>{
      if(!a.paymentMethods) a.paymentMethods = ['Goldpay.sg','Card','Thai QR'];
    });
    // Ensure cloudSync field exists
    if(!merged.cloudSync) merged.cloudSync = {enabled:false, binId:'', accessKey:'', lastSyncAt:0, lastPushAt:0};
    // Ensure new menus have defaults
    if(!merged.libraryArticles) merged.libraryArticles = JSON.parse(JSON.stringify(DEFAULT_STATE.libraryArticles));
    if(!merged.caseStudies) merged.caseStudies = JSON.parse(JSON.stringify(DEFAULT_STATE.caseStudies));
    if(!merged.officeOutDays) merged.officeOutDays = {};
    if(!merged.customEvents) merged.customEvents = {};
    if(!merged.auditLog) merged.auditLog = [];
    // Cleanup stale "Hi null!" greetings that were saved before this fix
    if(Array.isArray(merged.aiHistory)){
      merged.aiHistory = merged.aiHistory.filter(m =>
        !(m.role === 'bot' && typeof m.text === 'string' && m.text.startsWith('Hi null'))
      );
    }
    if(!merged.passwordChangedAt) merged.passwordChangedAt = {};
    if(merged.lastBackupAt===undefined) merged.lastBackupAt = 0;
    if(!merged.backups) merged.backups = [];
    // Always recompute ID sequences to be safe (handles imports, cloud sync of partial data, etc.)
    const safeMax = (arr) => arr && arr.length ? Math.max(...arr.map(x=>x.id||0))+1 : 1;
    if(!merged.libraryIdSeq || merged.libraryIdSeq <= safeMax(merged.libraryArticles)-1)
      merged.libraryIdSeq = safeMax(merged.libraryArticles);
    // Migration: ensure telegram config exists with all sub-fields
    if(!merged.telegram || typeof merged.telegram !== 'object'){
      merged.telegram = JSON.parse(JSON.stringify(DEFAULT_STATE.telegram));
    } else {
      // Backfill any missing sub-fields
      const tgDef = DEFAULT_STATE.telegram;
      if(typeof merged.telegram.enabled !== 'boolean') merged.telegram.enabled = false;
      if(typeof merged.telegram.token !== 'string') merged.telegram.token = '';
      if(typeof merged.telegram.chatId !== 'string') merged.telegram.chatId = '';
      if(!merged.telegram.notify || typeof merged.telegram.notify !== 'object'){
        merged.telegram.notify = JSON.parse(JSON.stringify(tgDef.notify));
      } else {
        for(const k of ['newTask','newShipment','reminder','monthlyReport']){
          if(typeof merged.telegram.notify[k] !== 'boolean') merged.telegram.notify[k] = tgDef.notify[k];
        }
      }
      if(typeof merged.telegram.monthlyReportLastSent !== 'string') merged.telegram.monthlyReportLastSent = '';
      if(typeof merged.telegram.lastSentAt !== 'number') merged.telegram.lastSentAt = 0;
    }
    // Migration: ensure learningModules exists (use DEFAULT_STATE seed if missing entirely)
    if(!Array.isArray(merged.learningModules)){
      merged.learningModules = JSON.parse(JSON.stringify(DEFAULT_STATE.learningModules));
    }
    if(!merged.learningModuleIdSeq || merged.learningModuleIdSeq <= safeMax(merged.learningModules)-1)
      merged.learningModuleIdSeq = safeMax(merged.learningModules);
    if(!merged.caseIdSeq || merged.caseIdSeq <= safeMax(merged.caseStudies)-1)
      merged.caseIdSeq = safeMax(merged.caseStudies);
    if(!merged.taskIdSeq || merged.taskIdSeq <= safeMax(merged.tasks)-1)
      merged.taskIdSeq = safeMax(merged.tasks);
    if(!merged.saleIdSeq || merged.saleIdSeq <= safeMax(merged.sales)-1)
      merged.saleIdSeq = safeMax(merged.sales);
    if(!merged.shipmentIdSeq || merged.shipmentIdSeq <= safeMax(merged.shipments)-1)
      merged.shipmentIdSeq = safeMax(merged.shipments);
    if(!merged.atmIdSeq || merged.atmIdSeq <= safeMax(merged.atms)-1)
      merged.atmIdSeq = safeMax(merged.atms);
    if(!merged.ideaIdSeq || merged.ideaIdSeq <= safeMax(merged.ideas)-1)
      merged.ideaIdSeq = safeMax(merged.ideas);
    // Ensure ALL nav labels exist (merge user customizations on top of defaults)
    merged.navLabels = {...DEFAULT_STATE.navLabels, ...(merged.navLabels||{})};
    // Ensure tasks have new fields
    merged.tasks.forEach(t=>{
      if(t.awaitingConfirm===undefined) t.awaitingConfirm = false;
      if(t.description===undefined) t.description = '';
      if(t.markedDoneAt===undefined) t.markedDoneAt = null;
      if(t.confirmedAt===undefined) t.confirmedAt = null;
      if(t.lastReminderAt===undefined) t.lastReminderAt = null;
      // Migrate single assignee → assignees array
      if(t.assignee && !t.assignees){
        t.assignees = [t.assignee];
      }
      if(!Array.isArray(t.assignees)) t.assignees = t.assignee ? [t.assignee] : [];
      // Keep .assignee as a derived/legacy field pointing to first assignee for backward compat
      t.assignee = t.assignees[0] || '';
    });
    // Ensure taskCategories list exists
    if(!Array.isArray(merged.taskCategories) || merged.taskCategories.length===0){
      merged.taskCategories = ['General','Sales','Marketing','Accountant','Gold ATM'];
    }
    // Ensure shipmentTemplate exists
    if(!merged.shipmentTemplate || typeof merged.shipmentTemplate !== 'object'){
      merged.shipmentTemplate = JSON.parse(JSON.stringify(DEFAULT_STATE.shipmentTemplate));
    }
    // Ensure notifications have forUser field
    merged.notifications.forEach(n=>{
      if(n.forUser===undefined) n.forUser = null;
    });
    // Ensure sales guides defaults
    if(merged.salesGuideOnline===undefined) merged.salesGuideOnline = '';
    if(merged.salesGuideAtm===undefined) merged.salesGuideAtm = '';
    if(merged.salesGuideOnlineTitle===undefined) merged.salesGuideOnlineTitle = 'Lazada';
    if(merged.salesGuideAtmTitle===undefined) merged.salesGuideAtmTitle = 'Gold ATM';
    // Ensure shipments have new fields (migrate old data)
    merged.shipments.forEach(sh=>{
      if(sh.handler!==undefined && !sh.handlers){
        // Migrate single handler → handlers array
        sh.handlers = sh.handler ? [sh.handler] : [];
        delete sh.handler;
      }
      if(!sh.handlers) sh.handlers = [];
      if(sh.notes===undefined) sh.notes = '';
      if(sh.shipOutDate===undefined) sh.shipOutDate = '';
      if(sh.deliveryDate===undefined) sh.deliveryDate = '';
      if(!sh.status) sh.status = 'in_progress';
      // Ensure each check item has a staff field
      for(const phase of ['p1','p2','p3','p4']){
        if(sh.checks[phase]){
          sh.checks[phase].forEach(c=>{ if(c.s===undefined) c.s = ''; });
        }
      }
    });

    // Ensure transfers ledger exists (migrate old data)
    if(!Array.isArray(merged.transfers)) merged.transfers = [];
    if(typeof merged.transferIdSeq !== 'number') merged.transferIdSeq = merged.transfers.length + 1;
    // Normalize legacy single-product transfers into multi-product (items) shape
    merged.transfers.forEach(t=>{
      if(!Array.isArray(t.items)){
        t.items = t.productId ? [{productId:t.productId, qty:t.qty||0}] : [];
        delete t.productId; delete t.qty;
      }
    });

    // ===== APP_CONFIG override =====
    // See applyAppConfig() — forces hardcoded sync credentials so no manual setup needed
    applyAppConfig(merged);

    return merged;
  }catch(e){return applyAppConfig(JSON.parse(JSON.stringify(DEFAULT_STATE)))}
}

// ===== Audit Log =====
function pushAuditLog(action, detail){
  if(!S.auditLog) S.auditLog = [];
  S.auditLog.push({
    ts: Date.now(),
    user: S.currentRole || 'system',
    action,
    detail: String(detail || '').slice(0, 300)
  });
  // Cap at 500 entries to prevent state bloat
  if(S.auditLog.length > 500) S.auditLog = S.auditLog.slice(-500);
}

// ===== Auto weekly backup =====
function checkAutoBackup(){
  if(!S.lastBackupAt) S.lastBackupAt = 0;
  if(!S.backups) S.backups = [];
  const oneWeek = 7 * 24 * 60 * 60 * 1000;
  if(Date.now() - S.lastBackupAt < oneWeek) return false;

  // Create snapshot — exclude bulky/sensitive fields
  const snap = {...S};
  delete snap.backups;
  delete snap.aiHistory;
  delete snap.auditLog;

  const snapshot = {
    ts: Date.now(),
    label: 'Weekly auto-backup ' + new Date().toLocaleDateString(),
    data: JSON.stringify(snap)
  };
  S.backups.push(snapshot);
  if(S.backups.length > 4) S.backups = S.backups.slice(-4);
  S.lastBackupAt = Date.now();
  console.log('[Auto-backup] Snapshot saved:', snapshot.label);
  return true;
}

function saveState(){
  // Stamp this save with a global timestamp — used to prevent stale pushes
  S.globalUpdatedAt = Date.now();
  try{localStorage.setItem(KEY, JSON.stringify(S))}catch(e){console.warn('Save failed',e)}
  _lastLocalSaveAt = Date.now();
  // Debounced cloud push
  scheduleCloudPush();
}

let _cloudPushTimer = null;
function scheduleCloudPush(){
  if(!S.cloudSync || !S.cloudSync.enabled || !S.cloudSync.binId) return;
  // Don't push if this device has never made real local changes
  if(!(S.globalUpdatedAt > 0)) return;
  // Don't push if local data is not newer than cloud (avoids stale device overwriting fresh cloud)
  if(S.globalUpdatedAt <= (S.cloudSync.lastSyncAt || 0)) return;
  if(_cloudPushTimer) clearTimeout(_cloudPushTimer);
  _cloudPushTimer = setTimeout(()=>{ pushToCloud(true); }, 2000); // 2s debounce
}

async function pushToCloud(silent=false){
  if(!S.cloudSync.enabled) return;
  if(!SB){
    if(!silent) toast('Supabase not ready','error');
    return;
  }
  try{
    // Strip fields that should not (or need not) be shared via cloud
    const toShare = {...S};
    delete toShare.aiHistory;        // private chat per user
    delete toShare.currentRole;      // each user has their own role
    delete toShare.cloudSync;        // hardcoded in APP_CONFIG, not needed in cloud
    delete toShare.backups;          // LOCAL safety snapshots — don't bloat cloud
    delete toShare.geminiApiKey;     // hardcoded in APP_CONFIG, not needed in cloud

    // Safety: only push if local data has been changed AFTER the last pull.
    const localTs = S.globalUpdatedAt || 0;
    const lastPull = S.cloudSync.lastSyncAt || 0;

    // Never push if this device has never made a real local change
    if(localTs === 0){
      console.log('[Cloud push] Skipped — this device has never saved locally (read-only device)');
      return;
    }

    if(localTs <= lastPull && lastPull > 0){
      console.log('[Cloud push] Skipped — no local changes since last pull (localTs=' + new Date(localTs).toLocaleTimeString() + ' <= lastPull=' + new Date(lastPull).toLocaleTimeString() + ')');
      return;
    }

    const bodyStr = JSON.stringify(toShare);
    console.log('[Cloud push] size=' + (bodyStr.length/1024).toFixed(1) + 'KB · tasks=' + S.tasks.length + ' sales=' + S.sales.length + ' products=' + S.products.length);

    // Use upsert so the row is created if missing (first run on a fresh Supabase project)
    const { error } = await SB
      .from('app_state')
      .upsert({
        id: 'main',
        data: toShare,
        global_updated_at: localTs,
        updated_at: new Date().toISOString()
      }, { onConflict: 'id' });

    if(error) throw new Error(error.message || 'Supabase error');

    S.cloudSync.lastPushAt = Date.now();
    try{ localStorage.setItem(KEY, JSON.stringify(S)) }catch(e){ console.warn('localStorage save failed', e); }
    console.log('[Cloud push] ✓ Success at', new Date().toLocaleTimeString());
    if(!silent) toast('Synced to cloud ✓','success');
    updateSyncIndicator();
  }catch(e){
    console.error('[Cloud push] FAILED:', e.message);
    if(!silent) toast('Sync failed: '+e.message,'error');
    updateSyncIndicator(true);
  }
}

async function pullFromCloud(silent=false){
  if(!S.cloudSync.enabled) return;
  if(!SB){
    if(!silent) toast('Supabase not ready','error');
    return;
  }
  try{
    const { data: row, error } = await SB
      .from('app_state')
      .select('data, global_updated_at')
      .eq('id', 'main')
      .maybeSingle();

    if(error) throw new Error(error.message || 'Supabase error');

    // Build the record in the shape the rest of the function expects (compatible with old JSONBin payload)
    let record = null;
    if(row && row.data){
      record = row.data;
      // Make sure globalUpdatedAt is present so downstream logic works
      if(row.global_updated_at && !record.globalUpdatedAt){
        record.globalUpdatedAt = Number(row.global_updated_at);
      }
    }
    if(!record || typeof record !== 'object') record = {};

    // If the bin is empty or has no real data (just init placeholder), don't overwrite local
    const hasRealData = record.tasks || record.products || record.atms || record.passwords;
    if(!hasRealData){
      if(!silent) toast('Cloud bin is empty — pushing local data instead','success');
      await pushToCloud(silent);
      return;
    }

    // === Deep-equality check via JSON hash — skip render only if cloud truly identical to local ===
    // Hash the actual data so any field change (officeSchedule, atms, ideas, etc.) triggers re-render.
    function quickHash(s){
      let h = 0;
      for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) | 0; }
      return h;
    }
    // Build comparable view of local state (strip per-device fields just like push does)
    const localCompare = {...S};
    delete localCompare.aiHistory;
    delete localCompare.currentRole;
    delete localCompare.cloudSync;
    delete localCompare.backups;
    delete localCompare.geminiApiKey;
    const localHash = quickHash(JSON.stringify(localCompare));
    const cloudHash = quickHash(JSON.stringify(record));

    if(localHash === cloudHash){
      // Truly identical — no re-render needed
      if(!S.cloudSync) S.cloudSync = {};
      S.cloudSync.lastSyncAt = Date.now();
      try{ localStorage.setItem(KEY, JSON.stringify(S)) }catch(e){}
      updateSyncIndicator();
      if(!silent) toast('Already up to date','success');
      return;
    }

    // === Timestamp check: only apply cloud data if it's NEWER than local ===
    // This is the key fix for the "phone pushes stale data" bug.
    // Every real local save stamps S.globalUpdatedAt = Date.now().
    // Cloud record also has globalUpdatedAt from the device that last pushed.
    // If local is NEWER → local wins, don't overwrite with cloud.
    const cloudTs = record.globalUpdatedAt || 0;
    const localTs2 = S.globalUpdatedAt || 0;
    if(localTs2 > cloudTs){
      // Local is newer than cloud — don't overwrite. But push local up to cloud instead.
      console.log('[Cloud pull] Local is NEWER than cloud (local=' + new Date(localTs2).toLocaleTimeString() + ' cloud=' + new Date(cloudTs).toLocaleTimeString() + ') — pushing local instead');
      S.cloudSync.lastSyncAt = Date.now();
      _lastLocalSaveAt = Date.now();
      try{ localStorage.setItem(KEY, JSON.stringify(S)) }catch(e){}
      await pushToCloud(true);
      return;
    }

    console.log('[Cloud pull] Applying cloud data (cloud=' + new Date(cloudTs).toLocaleTimeString() + ' local=' + new Date(localTs2).toLocaleTimeString() + ')');

    // Preserve LOCAL-ONLY fields that should never come from cloud
    const localHistory = S.aiHistory;
    const localCurrentRole = S.currentRole;  // CRITICAL: never let cloud overwrite who is logged in
    const localBackups = S.backups;          // backups are LOCAL safety snapshots, never overwritten by cloud
    const prevLastSyncAt = S.cloudSync?.lastSyncAt || 0;
    const prevLastPushAt = S.cloudSync?.lastPushAt || 0;

    S = {...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...record};
    S.aiHistory = localHistory;
    S.currentRole = localCurrentRole;  // restore
    S.backups = localBackups || [];

    // Re-apply hardcoded cloud + Gemini config (never let cloud-pulled data change these)
    applyAppConfig(S);
    S.cloudSync.lastSyncAt = Date.now();
    S.cloudSync.lastPushAt = prevLastPushAt;

    // Adopt cloud's globalUpdatedAt — this prevents the phone from thinking
    // its old local data is newer than what we just pulled from cloud.
    // After this, pushToCloud guard (localTs <= lastPull) will correctly block stale pushes.
    if(record.globalUpdatedAt){
      S.globalUpdatedAt = record.globalUpdatedAt;
    }

    // CRITICAL: update _lastLocalSaveAt after pull so the auto-push interval
    // doesn't immediately push stale local data back to cloud (overwriting the fresh pull)
    _lastLocalSaveAt = Date.now();

    try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){ console.warn('localStorage failed', e); }

    // === Force logout if password was changed remotely after this session started ===
    if(S.currentRole && S.passwordChangedAt && S.passwordChangedAt[S.currentRole]){
      const changedAt = S.passwordChangedAt[S.currentRole];
      if(changedAt > _sessionStartTime){
        // Manager (or someone) changed our password while we were logged in
        toast('Your password was changed elsewhere. Please log in again.','error');
        setTimeout(()=>{
          S.currentRole = null;
          S.aiHistory = [];
          localStorage.setItem(KEY, JSON.stringify(S));
          location.reload();
        }, 2000);
        return;
      }
    }

    if(!silent) toast('Pulled latest from cloud ✓','success');
    updateSyncIndicator();

    // === SKIP RE-RENDER if user is interacting (prevents flicker / losing input) ===
    // 1. If user is focused on an input/textarea/contenteditable, defer render
    // 2. If modal is open, defer render (rebuilding page wipes the modal)
    // 3. If AI panel is open, defer render (rebuilding wipes AI input mid-typing)
    const activeEl = document.activeElement;
    const isTyping = activeEl && (
      activeEl.tagName === 'INPUT' ||
      activeEl.tagName === 'TEXTAREA' ||
      activeEl.tagName === 'SELECT' ||
      activeEl.isContentEditable
    );
    const modalOpen = document.getElementById('modalBg')?.classList.contains('show');
    const aiOpen = document.getElementById('aiPanel')?.classList.contains('show');

    if(isTyping || modalOpen || aiOpen){
      // Defer: just update sidebar (notif counts), skip full page re-render
      renderSidebar();
      console.log('[pull] Re-render deferred — user is interacting');
      // Schedule a retry in 30s to render after they finish
      if(!window.__pendingRender){
        window.__pendingRender = setTimeout(()=>{
          window.__pendingRender = null;
          const stillTyping = document.activeElement && (
            document.activeElement.tagName === 'INPUT' ||
            document.activeElement.tagName === 'TEXTAREA' ||
            document.activeElement.tagName === 'SELECT' ||
            document.activeElement.isContentEditable
          );
          const stillModal = document.getElementById('modalBg')?.classList.contains('show');
          const stillAi = document.getElementById('aiPanel')?.classList.contains('show');
          if(!stillTyping && !stillModal && !stillAi && currentPage){
            renderPage();
          }
        }, 30000);
      }
      return;
    }

    renderSidebar();
    if(currentPage) renderPage();
  }catch(e){
    console.warn('Cloud pull failed:', e);
    if(!silent) toast('Pull failed: '+e.message,'error');
    updateSyncIndicator(true);
  }
}

function updateSyncIndicator(error=false){
  const dot = document.getElementById('syncDot');
  if(!dot) return;
  if(!S.cloudSync.enabled){ dot.style.display='none'; return; }
  dot.style.display='inline-block';
  dot.style.background = error ? 'var(--red)' : 'var(--green)';
  dot.title = error ? 'Sync error' : `Last sync: ${new Date(S.cloudSync.lastSyncAt||S.cloudSync.lastPushAt||Date.now()).toLocaleTimeString()}`;
}

// Auto-pull every 30s when cloud sync enabled (fallback in case Realtime drops)
setInterval(()=>{
  if(S.cloudSync && S.cloudSync.enabled && SB){
    // Don't pull if user just made local changes (let push happen first, longer grace)
    if(Date.now() - _lastLocalSaveAt < 15000) return;
    // Don't pull if user is typing (prevent flicker / wiping input)
    const activeEl = document.activeElement;
    const isTyping = activeEl && (
      activeEl.tagName === 'INPUT' ||
      activeEl.tagName === 'TEXTAREA' ||
      activeEl.tagName === 'SELECT' ||
      activeEl.isContentEditable
    );
    if(isTyping) return;
    // Don't pull if modal is open
    if(document.getElementById('modalBg')?.classList.contains('show')) return;
    // Don't pull if AI panel is open (would wipe input + re-render messages)
    if(document.getElementById('aiPanel')?.classList.contains('show')) return;
    // Only pull if last pull > 25s ago
    if(Date.now() - (S.cloudSync.lastSyncAt||0) > 25000){
      pullFromCloud(true);
    }
  }
}, 30000);

// ===== Supabase Realtime: instant sync when another device pushes =====
// This makes changes appear in ~1 second instead of waiting up to 30 seconds for the poll.
// The 30s poll above stays as a safety net in case the Realtime WebSocket drops.
let _realtimeChannel = null;
function setupRealtime(){
  if(!SB || _realtimeChannel) return;
  try{
    _realtimeChannel = SB
      .channel('app_state_changes')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'app_state', filter: 'id=eq.main' },
        (payload) => {
          // Skip if we just pushed (likely our own change echoing back)
          if(Date.now() - (S.cloudSync.lastPushAt||0) < 3000) return;
          // Skip if user is typing or modals open (same guards as poll)
          const activeEl = document.activeElement;
          const isTyping = activeEl && (
            activeEl.tagName === 'INPUT' ||
            activeEl.tagName === 'TEXTAREA' ||
            activeEl.tagName === 'SELECT' ||
            activeEl.isContentEditable
          );
          if(isTyping) return;
          if(document.getElementById('modalBg')?.classList.contains('show')) return;
          if(document.getElementById('aiPanel')?.classList.contains('show')) return;
          console.log('[Realtime] Cloud changed — pulling');
          pullFromCloud(true);
        }
      )
      .subscribe((status) => {
        console.log('[Realtime] Subscription status:', status);
      });
  }catch(e){
    console.warn('[Realtime] Setup failed (will fall back to 30s polling):', e);
  }
}
// Start realtime once everything is loaded
setTimeout(setupRealtime, 1500);

// ===== TELEGRAM NOTIFICATIONS =====
// Telegram Bot API integration — Manager configures token + chat ID in Settings.
// Each event is logged to Supabase `telegram_log` to prevent duplicate sends when
// multiple Manager devices are open simultaneously (last-write-wins via unique constraint).

function telegramConfigured(){
  const tg = S.telegram;
  return !!(tg && tg.enabled && tg.token && tg.chatId);
}

// Escape user text for Telegram Markdown V2 (special chars need backslash)
function tgEscape(str){
  return String(str==null?'':str).replace(/[_*[\]()~`>#+\-=|{}.!\\]/g, '\\$&');
}

// Try to atomically claim an event for sending — returns true if THIS device should send.
// Uses Supabase insert with unique constraint; if insert fails with 23505 (duplicate),
// another device already sent it.
async function claimTelegramEvent(eventType, eventId){
  if(!SB) return true; // No Supabase — best-effort, allow send (rare edge case)
  try {
    const { error } = await SB
      .from('telegram_log')
      .insert({
        event_key: `${eventType}:${eventId}`,
        sent_at: new Date().toISOString(),
        sent_by: S.currentRole || 'unknown'
      });
    if(error){
      // 23505 = unique_violation → another device claimed first
      if(error.code === '23505' || /duplicate|unique/i.test(error.message||'')){
        console.log('[Telegram] Skipped — already sent by another device:', eventType, eventId);
        return false;
      }
      // Table doesn't exist yet OR network error → allow send (don't block notifications because of setup gap)
      console.warn('[Telegram] Claim warning (will send anyway):', error.message);
      return true;
    }
    return true;
  } catch(e){
    console.warn('[Telegram] Claim exception (will send anyway):', e.message);
    return true;
  }
}

// Send a message to Telegram. eventType + eventId required for dedup.
// Only Manager devices should call this — gated at trigger points.
async function sendTelegram(message, eventType, eventId, opts={}){
  if(!telegramConfigured()) return;
  if(!isManager()) return; // Only Manager devices send (reduces 4x duplicate from staff)
  const notifyKey = opts.notifyKey;
  if(notifyKey && !S.telegram.notify[notifyKey]) return; // Toggled off

  // Claim dedup slot first
  const canSend = await claimTelegramEvent(eventType, eventId);
  if(!canSend) return;

  try {
    const url = `https://api.telegram.org/bot${S.telegram.token}/sendMessage`;
    const r = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        chat_id: S.telegram.chatId,
        text: message,
        parse_mode: 'MarkdownV2',
        disable_web_page_preview: true
      })
    });
    if(!r.ok){
      const errBody = await r.text().catch(()=>'(no body)');
      throw new Error('HTTP '+r.status+': '+errBody.slice(0,200));
    }
    S.telegram.lastSentAt = Date.now();
    console.log('[Telegram] ✓ Sent:', eventType, eventId);
    // Save state but DON'T bump globalUpdatedAt (lastSentAt change shouldn't trigger cloud sync)
    try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){}
  } catch(e){
    console.error('[Telegram] Send failed:', e.message);
    if(opts.showError) toast('Telegram error: '+e.message,'error');
  }
}

// ----- Message formatters -----
function tgFormatNewTask(t){
  const assigneeStr = (taskAssignees(t)||[]).map(a=>tgEscape(a)).join(', ') || 'unassigned';
  const prio = (t.priority||'medium').toUpperCase();
  const prioIcon = t.priority==='high'?'🔴':t.priority==='low'?'🟢':'🟡';

  const parts = [];
  parts.push(`📋 *New Task*`);
  parts.push(``);
  parts.push(`*${tgEscape(t.title)}*`);
  parts.push(`🆔 Task \\#${t.id}`);
  parts.push(`${prioIcon} ${prio} priority`);
  parts.push(`📁 Category: ${tgEscape(t.category||'General')}`);
  parts.push(`👤 Assigned to: ${assigneeStr}`);
  if(t.due) parts.push(`📅 Due: ${tgEscape(t.due)}`);
  if(t.createdAt){
    const created = new Date(t.createdAt);
    const createdStr = created.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    parts.push(`🕐 Created: ${tgEscape(createdStr)}`);
  }
  if(t.updatedBy) parts.push(`✍️ By: ${tgEscape(t.updatedBy)}`);

  if(t.description && t.description.trim()){
    parts.push(``);
    parts.push(`📝 *Description*`);
    // Telegram message limit is 4096 chars. We've used ~250 chars for metadata, so allow ~3500 for description.
    const maxDescLen = 3500;
    const desc = t.description.trim();
    if(desc.length > maxDescLen){
      parts.push(tgEscape(desc.slice(0, maxDescLen)));
      parts.push(``);
      parts.push(`_\\.\\.\\. \\(truncated, ${desc.length - maxDescLen} more chars in app\\)_`);
    } else {
      parts.push(tgEscape(desc));
    }
  }

  return parts.join('\n');
}

function tgFormatNewShipment(sh){
  const handlers = (sh.handlers||[]).map(h=>tgEscape(h)).join(', ') || 'no handler';
  const shipOut = sh.shipOutDate ? `\n📦 Ship out: ${tgEscape(sh.shipOutDate)}` : '';
  const delivery = sh.deliveryDate ? `\n🚚 Delivery: ${tgEscape(sh.deliveryDate)}` : '';
  const notes = sh.notes ? `\n\n${tgEscape(sh.notes.slice(0,200))}` : '';
  return `🚢 *New Shipment*\n\n*${tgEscape(sh.name)}*\n👤 Handler: ${handlers}${shipOut}${delivery}${notes}`;
}

function tgFormatReminder(t){
  const assigneeStr = (taskAssignees(t)||[]).map(a=>tgEscape(a)).join(', ') || 'unassigned';
  const due = t.due ? `\n📅 Due: ${tgEscape(t.due)}` : '';
  return `⏰ *Task Reminder*\n\n*${tgEscape(t.title)}*\n👤 ${assigneeStr}${due}\n\nManager has nudged this task\\.`;
}

function tgFormatMonthlyReport(year, month, staffDays){
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monthName = monthNames[month] || `Month ${month+1}`;
  let body = `📊 *Monthly Office Days Report*\n*${tgEscape(monthName)} ${year}*\n\nTarget: 6 office days per staff\n`;
  const lines = [];
  S.employees.forEach(emp => {
    const days = staffDays[emp] || 0;
    const status = days >= 6 ? '✅' : days >= 4 ? '🟡' : '🔴';
    lines.push(`${status} *${tgEscape(emp)}*: ${days}/6 days`);
  });
  body += '\n' + lines.join('\n');
  // Add summary
  const totalAchieved = S.employees.filter(e => (staffDays[e]||0) >= 6).length;
  body += `\n\n_${totalAchieved}/${S.employees.length} staff hit the target this month\\._`;
  return body;
}

// ----- Monthly report cron-like check -----
// Triggers when: today is last day of month AND time is ≥18:00 AND not yet sent this month
// Called periodically + on each renderPage
let _lastMonthlyCheckAt = 0;
function maybeFireMonthlyReport(){
  if(!telegramConfigured() || !isManager()) return;
  if(!S.telegram.notify.monthlyReport) return;
  // Throttle: don't check more than once per minute
  if(Date.now() - _lastMonthlyCheckAt < 60000) return;
  _lastMonthlyCheckAt = Date.now();

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const day = now.getDate();
  const hour = now.getHours();

  // Last day of current month
  const lastDay = new Date(year, month+1, 0).getDate();
  if(day !== lastDay || hour < 18) return;

  // Check if we already sent for this month-year
  const tag = `${year}-${String(month+1).padStart(2,'0')}`;
  if(S.telegram.monthlyReportLastSent === tag) return;

  // Compute office days for this month
  const staffDays = {};
  S.employees.forEach(e => staffDays[e] = 0);
  for(const dk in (S.officeSchedule||{})){
    const d = new Date(dk);
    if(d.getMonth() === month && d.getFullYear() === year){
      (S.officeSchedule[dk]||[]).forEach(emp => {
        if(staffDays[emp] !== undefined) staffDays[emp]++;
      });
    }
  }

  const msg = tgFormatMonthlyReport(year, month, staffDays);
  // Use month-year tag as event_id for dedup across all Manager devices
  sendTelegram(msg, 'monthly_report', tag, { notifyKey: 'monthlyReport' })
    .then(() => {
      S.telegram.monthlyReportLastSent = tag;
      try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){}
    })
    .catch(e => console.warn('[Telegram] Monthly report send error:', e));
}
// Also check every 10 minutes regardless of activity
setInterval(maybeFireMonthlyReport, 10*60*1000);

let pendingRole = null;
function showPasswordScreen(role){
  pendingRole = role;
  $('#roleSelectScreen').style.display='none';
  $('#passwordScreen').classList.add('show');
  $('#pwdRoleName').textContent = role;
  $('#pwdInput').value = '';
  $('#pwdError').textContent = '';
  setTimeout(()=>$('#pwdInput').focus(), 100);
}
function backToRoleSelect(){ pendingRole = null; showRoleSelect(); }

function submitPassword(){
  const pwd = $('#pwdInput').value;
  // Try locally first
  let correct = S.passwords[pendingRole];
  if(pwd === correct){
    login(pendingRole);
    return;
  }
  // If wrong, try pulling fresh passwords from cloud and retry
  if(S.cloudSync && S.cloudSync.enabled && S.cloudSync.binId){
    $('#pwdError').textContent = 'Checking...';
    pullFromCloud(true).then(()=>{
      correct = S.passwords[pendingRole];
      if(pwd === correct){
        login(pendingRole);
      } else {
        $('#pwdError').textContent = 'Incorrect password';
        $('#pwdInput').classList.add('login-error-shake');
        setTimeout(()=>$('#pwdInput').classList.remove('login-error-shake'),400);
      }
    }).catch(()=>{
      $('#pwdError').textContent = 'Incorrect password';
      $('#pwdInput').classList.add('login-error-shake');
      setTimeout(()=>$('#pwdInput').classList.remove('login-error-shake'),400);
    });
  } else {
    $('#pwdError').textContent = 'Incorrect password';
    $('#pwdInput').classList.add('login-error-shake');
    setTimeout(()=>$('#pwdInput').classList.remove('login-error-shake'),400);
  }
}
$('#pwdInput')?.addEventListener('keydown', e=>{ if(e.key==='Enter') submitPassword(); });

function login(role){
  S.currentRole = role;
  // Save WITHOUT bumping globalUpdatedAt — logging in/out is not a real data change,
  // and we don't want this device to think it has newer data than cloud.
  try{ localStorage.setItem(KEY, JSON.stringify(S)) }catch(e){}
  $('#loginScreen').style.display='none';
  $('#app').style.display='block';
  $('#currentRole').textContent = role;
  currentPage = 'dashboard';

  // Pull latest from cloud BEFORE rendering, so dashboard shows fresh data
  const continueLogin = () => {
    renderSidebar(); renderPage();
    updateTickerUI(); updateNotifBadge();
    updateSyncIndicator();
    scheduleDailyReminder();
    if(Date.now() - S.lastPriceUpdate > 3600000){
      fetchGoldPrice(true);
    }
  };

  if(S.cloudSync && S.cloudSync.enabled && S.cloudSync.binId){
    document.getElementById('mainContent')?.classList.add('loading');
    pullFromCloud(true).then(()=>{
      continueLogin();
      document.getElementById('mainContent')?.classList.remove('loading');
    }).catch(()=>{
      continueLogin();
      document.getElementById('mainContent')?.classList.remove('loading');
    });
  } else {
    continueLogin();
  }
}
function logout(){
  S.currentRole = null;
  S.aiHistory = [];
  // Save WITHOUT bumping globalUpdatedAt

}

function navigate(page){
  // Validate page is accessible to current role
  const allowed = getNavItems().map(it=>it.key);
  if(!allowed.includes(page)){
    // Special case: staff trying to access 'tasks' redirects to 'mytasks', vice versa
    if(page==='tasks' && !isManager()) page = 'mytasks';

    }

  currentPage = page;
  renderSidebar();

  window.scrollTo({top:0, behavior:'smooth'});

pageRenderers.tasks = (m) => {
  const filterAssignee = window.__taskFilter || 'all';
  const filterPriority = window.__taskPrioFilter || 'all';
  let tasks = [...S.tasks];
  if(filterAssignee!=='all') tasks = tasks.filter(t=>taskAssignees(t).includes(filterAssignee));
  if(filterPriority!=='all') tasks = tasks.filter(t=>t.priority===filterPriority);

  // Priority order: urgent (high) → mid → low
  const prioRank = {high:0, mid:1, low:2};
  const sortByPriorityDueCreated = (a,b)=>{
    // 1. By priority
    const pa = prioRank[a.priority] ?? 99;
    const pb = prioRank[b.priority] ?? 99;
    if(pa !== pb) return pa - pb;
    // 2. By due date (nearest first; tasks without due go last)
    const ta = a.due ? new Date(a.due).getTime() : Infinity;
    const tb = b.due ? new Date(b.due).getTime() : Infinity;
    if(ta !== tb) return ta - tb;
    // 3. By creation time (oldest first — tasks that have been waiting longest go up)
    return (a.createdAt||0) - (b.createdAt||0);
  };

  const todo = tasks.filter(t=>!t.done && !t.awaitingConfirm).sort(sortByPriorityDueCreated);
  const awaiting = tasks.filter(t=>!t.done && t.awaitingConfirm).sort((a,b)=>(b.markedDoneAt||0)-(a.markedDoneAt||0));
  const done = tasks.filter(t=>t.done).sort((a,b)=>(b.confirmedAt||b.markedDoneAt||0)-(a.confirmedAt||a.markedDoneAt||0));

  m.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-sub">Workflow</div>
        <h1 class="page-title editable" data-edit="navLabels.tasks">${escapeHtml(S.navLabels.tasks)}</h1>
      </div>
