      </div>

      ${(c.tags && c.tags.length)?`<div class="flex gap-8" style="flex-wrap:wrap;padding-top:8px">${c.tags.map(t=>`<span class="muted" style="font-size:12px">#${escapeHtml(t)}</span>`).join('')}</div>`:''}
      <div class="flex gap-8" style="margin-top:18px"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>
    </div>
  `);
}

function openCaseModal(id){
  if(!isManager()) return;
  const isNew = id===-1;
  const c = isNew ? {title:'',severity:'medium',situation:'',steps:'',tags:[]} : S.caseStudies.find(x=>x.id===id);
  if(!c) return;
  modal(`
    <h3>${isNew?'New Case Study':'Edit Case'}</h3>
    <div class="form-row"><label class="label">Case title</label><input class="input" id="cTitle" value="${escapeHtml(c.title)}" placeholder="e.g., Customer claims missing item"></div>
    <div class="form-row"><label class="label">Severity</label>
      <select class="input" id="cSev">
        <option value="low" ${c.severity==='low'?'selected':''}>Low</option>
        <option value="medium" ${c.severity==='medium'?'selected':''}>Medium</option>
        <option value="high" ${c.severity==='high'?'selected':''}>High</option>
      </select>
    </div>
    <div class="form-row"><label class="label">Situation (what happens?)</label>
      <textarea class="input" id="cSit" style="min-height:80px" placeholder="Describe the scenario...">${escapeHtml(c.situation)}</textarea>
    </div>
    <div class="form-row"><label class="label">Resolution steps</label>
      <textarea class="input" id="cSteps" style="min-height:160px" placeholder="1. ...\n2. ...\n3. ...">${escapeHtml(c.steps)}</textarea>
    </div>
    <div class="form-row"><label class="label">Tags (comma-separated)</label>
      <input class="input" id="cTags" value="${escapeHtml((c.tags||[]).join(', '))}" placeholder="e.g., dispute, refund, urgent">
    </div>
    <div class="flex gap-8" style="margin-top:18px">
      <button class="btn btn-primary" onclick="saveCase(${id})">${isNew?'Publish':'Update'}</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);
}
function saveCase(id){
  const title = $('#cTitle').value.trim();
  const situation = $('#cSit').value.trim();
  const steps = $('#cSteps').value.trim();
  if(!title || !situation || !steps) return toast('Title, situation, and steps all required','error');
  const obj = {
    title,
    severity: $('#cSev').value,
    situation, steps,
    tags: $('#cTags').value.split(',').map(s=>s.trim()).filter(Boolean),
    author: S.currentRole,
    date: Date.now()
  };
  if(id===-1){
    obj.id = S.caseIdSeq++;
    S.caseStudies.push(obj);
  }else{
    const c = S.caseStudies.find(x=>x.id===id);
    if(c){
      c.title = obj.title; c.severity = obj.severity;
      c.situation = obj.situation; c.steps = obj.steps; c.tags = obj.tags;
    }
  }
  saveState(); closeModal(); renderPage();
  toast(id===-1?'Case published':'Case updated','success');
}
function deleteCase(id){
  if(!confirm('Delete this case study?')) return;
  S.caseStudies = S.caseStudies.filter(c=>c.id!==id);
  saveState(); renderPage(); toast('Case deleted');
}

function removeEmployee(name){
  // Check for orphan references
  const taskCount = S.tasks.filter(t=>taskAssignees(t).includes(name)).length;
  const shipCount = S.shipments.filter(s => (s.handlers||[]).includes(name)).length;
  const stepStaffCount = S.shipments.reduce((acc, sh) => {
    for(const p of ['p1','p2','p3','p4']){
      if(sh.checks[p]){
        acc += sh.checks[p].filter(c=>c.s===name).length;
      }
    }
    return acc;
  }, 0);
  let officeCount = 0;
  for(const dk in S.officeSchedule) if(S.officeSchedule[dk].includes(name)) officeCount++;
  let outCount = 0;
  if(S.officeOutDays) for(const dk in S.officeOutDays) outCount += S.officeOutDays[dk].filter(o=>o.employee===name).length;

  let msg = `Remove ${name}? This will also delete their password.`;
  if(taskCount || shipCount || stepStaffCount || officeCount || outCount){
    msg += `\n\nAlso affects: ${taskCount} task(s), ${shipCount} shipment(s) as handler, ${stepStaffCount} shipment step(s), ${officeCount} office day(s), ${outCount} out-of-office record(s).`;
    msg += `\n\nThese will be reassigned or cleared.`;
  }
  if(!confirm(msg)) return;

  // Cleanup orphan references
  const fallback = S.employees.find(e=>e!==name) || 'Manager';
  S.tasks.forEach(t=>{
    // Remove from assignees array; if empty, assign to fallback
    if(Array.isArray(t.assignees)){
      t.assignees = t.assignees.filter(a=>a!==name);
      if(t.assignees.length === 0) t.assignees = [fallback];
      t.assignee = t.assignees[0]; // sync legacy field
    } else if(t.assignee === name){
      t.assignee = fallback;
      t.assignees = [fallback];
    }
  });
  // New: handlers array
  S.shipments.forEach(s=>{
    if(s.handlers) s.handlers = s.handlers.filter(h=>h!==name);
    // Old field fallback
    if(s.handler===name) s.handler = '';
    // Per-step staff
    for(const p of ['p1','p2','p3','p4']){
      if(s.checks[p]) s.checks[p].forEach(c=>{ if(c.s===name) c.s=''; });
    }
  });
  for(const dk in S.officeSchedule){
    S.officeSchedule[dk] = S.officeSchedule[dk].filter(e=>e!==name);
    if(S.officeSchedule[dk].length===0) delete S.officeSchedule[dk];
  }
  if(S.officeOutDays){
    for(const dk in S.officeOutDays){
      S.officeOutDays[dk] = S.officeOutDays[dk].filter(o=>o.employee!==name);
      if(S.officeOutDays[dk].length===0) delete S.officeOutDays[dk];
    }
  }
  // Remove from votes
  S.ideas.forEach(i=>{ i.votes = i.votes.filter(v=>v!==name); });
  // Clean notifications addressed to this user
  S.notifications = S.notifications.filter(n => n.forUser !== name);
  // Clean sales staff field — set to "(removed)"
  S.sales.forEach(s=>{ if(s.staff===name) s.staff = '(removed)'; });

  S.employees = S.employees.filter(e=>e!==name);
  delete S.passwords[name];
  saveState(); renderPage();
  toast(`Removed ${name} (cleaned ${taskCount+shipCount+stepStaffCount+officeCount+outCount} references)`,'success');
}
function renameEmployee(oldName){
  const newName = prompt(`Rename "${oldName}" to:`, oldName);
  if(!newName) return;
  const trimmed = newName.trim();
  if(!trimmed || trimmed===oldName) return;
  if(trimmed==='Manager' || S.employees.includes(trimmed)) return toast('Name already exists','error');

  // Update everywhere
  S.employees = S.employees.map(e=>e===oldName?trimmed:e);
  if(S.passwords[oldName]){
    S.passwords[trimmed] = S.passwords[oldName];
    delete S.passwords[oldName];
  }
  S.tasks.forEach(t=>{
    if(Array.isArray(t.assignees)){
      t.assignees = t.assignees.map(a=>a===oldName?trimmed:a);
    }
    if(t.assignee===oldName) t.assignee = trimmed;
  });
  S.shipments.forEach(s=>{
    if(s.handlers) s.handlers = s.handlers.map(h => h===oldName ? trimmed : h);
    if(s.handler===oldName) s.handler = trimmed;
    // Per-step staff
    for(const p of ['p1','p2','p3','p4']){
      if(s.checks[p]) s.checks[p].forEach(c=>{ if(c.s===oldName) c.s=trimmed; });
    }
  });
  S.sales.forEach(s=>{ if(s.staff===oldName) s.staff = trimmed; });
  for(const dk in S.officeSchedule){
    S.officeSchedule[dk] = S.officeSchedule[dk].map(e=>e===oldName?trimmed:e);
  }
  if(S.officeOutDays){
    for(const dk in S.officeOutDays){
      S.officeOutDays[dk].forEach(o=>{ if(o.employee===oldName) o.employee = trimmed; });
    }
  }
  S.ideas.forEach(i=>{
    i.votes = i.votes.map(v=>v===oldName?trimmed:v);
    if(i.author===oldName) i.author = trimmed;
  });
  S.libraryArticles.forEach(a=>{ if(a.author===oldName) a.author = trimmed; });
  S.caseStudies.forEach(c=>{ if(c.author===oldName) c.author = trimmed; });
  S.notifications.forEach(n=>{
    n.text = n.text.replace(new RegExp('\\b'+oldName+'\\b','g'), trimmed);
    if(n.forUser===oldName) n.forUser = trimmed;
  });

  saveState(); renderPage();
  toast(`Renamed ${oldName} → ${trimmed}`,'success');
}

function createManualBackup(){
  if(!isManager()) return;
  if(!S.backups) S.backups = [];
  const snap = {...S};
  delete snap.backups;
  delete snap.aiHistory;
  delete snap.auditLog;

  const label = prompt('Backup label (optional):', `Manual backup ${new Date().toLocaleDateString()}`);
  if(label === null) return; // cancelled

  const snapshot = {
    ts: Date.now(),
    label: label.trim() || `Manual backup ${new Date().toLocaleDateString()}`,
    data: JSON.stringify(snap)
  };
  S.backups.push(snapshot);
  if(S.backups.length > 8) S.backups = S.backups.slice(-8); // keep last 8 (4 auto + 4 manual)
  pushAuditLog('backup.manual', snapshot.label);
  saveState();
  toast('Backup created ✓','success');
  // Refresh settings if currently viewing
  if(currentPage === 'settings') renderPage();
}

function restoreBackup(idx){
  if(!isManager()) return;
  const b = S.backups?.[idx];
  if(!b) return toast('Backup not found','error');
  if(!confirm(`⚠ RESTORE this backup?\n\nLabel: ${b.label}\nDate: ${new Date(b.ts).toLocaleString()}\n\nThis will REPLACE all current data (tasks, sales, inventory, etc.) with the snapshot. Cannot be undone.\n\nA new backup of CURRENT data will be created first for safety.`)) return;

  try{
    // First, snapshot current state as safety backup
    const safety = {...S};
    delete safety.backups;
    delete safety.aiHistory;
    delete safety.auditLog;
    if(!S.backups) S.backups = [];
    S.backups.push({
      ts: Date.now(),
      label: `Pre-restore safety backup ${new Date().toLocaleDateString()}`,
      data: JSON.stringify(safety)
    });

    // Parse and merge the restore data
    const restored = JSON.parse(b.data);
    const localCurrentRole = S.currentRole;
    const localCloudSync = S.cloudSync;
    const localGeminiKey = S.geminiApiKey;
    const localBackups = S.backups; // keep updated backups
    const localAuditLog = S.auditLog;

    S = {...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...restored};
    S.currentRole = localCurrentRole;
    S.cloudSync = localCloudSync;
    S.geminiApiKey = localGeminiKey;
    S.backups = localBackups;
    S.auditLog = localAuditLog;
    pushAuditLog('backup.restore', `Restored: ${b.label}`);
    saveState();
    closeModal();
    renderPage();
    toast(`Restored from "${b.label}" — refresh other devices to see changes`,'success');
  }catch(e){
    toast('Restore failed: '+e.message,'error');
    console.error(e);
  }
}

function deleteBackup(idx){
  if(!isManager()) return;
  const b = S.backups?.[idx];
  if(!b) return;
  if(!confirm(`Delete backup "${b.label}"?`)) return;
  pushAuditLog('backup.delete', b.label);
  S.backups.splice(idx, 1);
  saveState();
  if(currentPage === 'settings') renderPage();
  toast('Backup deleted');
  // Re-open backups modal so user sees the updated list
  setTimeout(()=>openBackups(), 100);
}

      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);
}
function saveTask(){
  if(!isManager()) return toast('Only Manager can create tasks','error');
  const title = $('#tTitle').value.trim();
  if(!title) return toast('Title required','error');
  const assignees = [...document.querySelectorAll('[data-tassign-cb]:checked')].map(cb=>cb.value);
  if(assignees.length===0) return toast('Assign to at least one person','error');
  const t = {
    id: S.taskIdSeq++,
    title,
    assignees,
    assignee: assignees[0], // legacy field for backward compat
    priority: $('#tPrio').value,
    category: $('#tCat').value.trim() || 'General',
    due: $('#tDue').value || '',
    description: $('#tDesc').value || '',
    done: false,
    awaitingConfirm: false,
    createdAt: Date.now(),
    updatedAt: Date.now(),
    updatedBy: S.currentRole
  };
  S.tasks.push(t);
  pushAuditLog('task.create', `Task #${t.id} "${title}" → ${assignees.join(', ')}`);
  saveState(); closeModal(); renderPage();
  toast(`Task assigned to ${assignees.join(', ')}`,'success');
  if(t.priority==='high'){
    pushNotif(`Urgent task for ${t.assignee}: ${t.title}`);
  }
  // Telegram notification (Manager-created tasks only — self-tasks handled separately)
  sendTelegram(tgFormatNewTask(t), 'task.create', t.id, { notifyKey: 'newTask' });
}
function toggleTask(id){
  const t = S.tasks.find(x=>x.id===id);
  if(!t) return;
  if(!isManager() && !taskIsMine(t)) return toast('Not your task','error');
  // New workflow: staff "Done" button → awaiting confirm; manager Confirm → done
  if(isManager()){
    if(t.done){
      reopenTask(id);
    } else if(t.awaitingConfirm){
      managerConfirmTask(id);
    } else {
      // Manager directly marking done without staff workflow
      t.done = true;
      t.confirmedAt = Date.now();
      saveState(); renderPage();
      toast('Task marked done ✓','success');
    }
  } else {
    // Staff: redirect to staffMarkDone
    if(!t.done && !t.awaitingConfirm){
      staffMarkDone(id);
    }
  }
}
function deleteTask(id){
  if(!isManager()) return;
  if(!confirm('Delete this task?')) return;
  S.tasks = S.tasks.filter(t=>t.id!==id);
  saveState(); renderPage(); toast('Task deleted');
}

function filterSaleProducts(query){
  const q = (query||'').toLowerCase().trim();
  const matches = S.products.filter(p=>{
    if(!q) return true;
    return p.id.toLowerCase().includes(q) || p.name.toLowerCase().includes(q) || (p.type||'').toLowerCase().includes(q);
  }).slice(0, 12);
  const results = document.getElementById('sProdResults');
  if(!results) return;
  if(matches.length === 0){
    results.style.display = 'block';
    results.innerHTML = `<div style="padding:10px 14px;color:var(--text-dim);font-size:12px">No products match "${escapeHtml(query)}"</div>`;
    return;
  }
  results.style.display = 'block';
  results.innerHTML = matches.map(p=>{
    const stockTotal = Object.values(p.warehouses||{}).reduce((a,b)=>a+(b||0),0);
    return `
      <div onclick="pickSaleProduct('${escapeHtml(p.id).replace(/'/g,"\\'")}')" style="padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--line);font-size:13px" onmouseover="this.style.background='var(--soft)'" onmouseout="this.style.background=''">
        <div style="font-weight:600;color:var(--text)">${escapeHtml(p.name)}</div>
        <div class="muted" style="font-size:11px">${escapeHtml(p.id)} · ${escapeHtml(p.type||'?')} · Stock: ${stockTotal}</div>
      </div>
    `;
  }).join('');
}

function pickSaleProduct(pid){
  const p = S.products.find(x=>x.id===pid);
  if(!p) return;
  document.getElementById('sProd').value = pid;
  document.getElementById('sProdSearch').value = p.name;
  const sel = document.getElementById('sProdSelected');
  if(sel) sel.innerHTML = `✓ Selected: <strong>${escapeHtml(p.id)} · ${escapeHtml(p.name)}</strong>`;
  document.getElementById('sProdResults').style.display = 'none';
}

function updateSalePaymentVisibility(){
  const v = $('#sWh').value;
  const isAtm = v.startsWith('ATM::');
  $('#paymentRow').style.display = isAtm ? 'block' : 'none';
}
function saveSale(){
  const pid = $('#sProd').value;
  if(!pid) return toast('Please select a product from the search results','error');
  const prod = S.products.find(p=>p.id===pid);
  if(!prod) return toast('Product not found','error');
  const qty = parseInt($('#sQty').value)||0;
  const price = parseInt($('#sPrice').value)||0;
  const [channel, warehouse] = $('#sWh').value.split('::');
  if(qty<=0 || price<=0) return toast('Invalid quantity or price','error');
  if((prod.warehouses[warehouse]||0) < qty){
    if(!confirm(`Only ${prod.warehouses[warehouse]||0} in stock at ${warehouse}. Record anyway?`)) return;
  }
  const payment = (channel==='ATM') ? $('#sPayment').value : '';

  // Parse date from input
  const dateStr = $('#sDate').value;
  let saleDate = Date.now();
  if(dateStr){
    const parsed = new Date(dateStr).getTime();
    if(!isNaN(parsed)) saleDate = parsed;
  }

  const newId = S.saleIdSeq++;
  S.sales.push({
    id: newId, productId:pid, productName:prod.name,
    qty, price, channel, warehouse, payment,
    staff: S.currentRole, date: saleDate,
    updatedAt: Date.now(), updatedBy: S.currentRole
  });
  prod.warehouses[warehouse] = Math.max(0, (prod.warehouses[warehouse]||0) - qty);
  pushAuditLog('sale.create', `Sale #${newId}: ${qty}× ${prod.name} @ ${warehouse} (${fmtTHB(qty*price)})`);
  saveState(); closeModal(); renderPage();
  toast(`Sale recorded · ${fmtTHB(qty*price)}`,'success');
}

/* ====== EDITABLE LABELS ====== */
function attachEditables(){
  if(!isManager()) return;
  $$('.editable').forEach(el=>{
    el.addEventListener('click', function once(){
      el.setAttribute('contenteditable','true');
      el.focus();
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);
      el.removeEventListener('click', once);
    });
    el.addEventListener('blur', ()=>{
      el.removeAttribute('contenteditable');
      const path = el.dataset.edit.split('.');
      let obj = S; for(let i=0;i<path.length-1;i++) obj = obj[path[i]];
      obj[path[path.length-1]] = el.textContent.trim();
      saveState();
      renderSidebar();
      toast('Label updated','success');
    });
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault(); el.blur();} });
  });
}

// Simple markdown renderer for AI responses
function renderMarkdown(text){
  if(!text) return '';
  // First escape HTML to prevent XSS
  let html = text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

  // Code blocks ```code``` (multiline)
  html = html.replace(/```([\s\S]*?)```/g, (m, code) =>
    `<pre style="background:rgba(0,0,0,0.05);padding:8px 10px;border-radius:6px;font-family:monospace;font-size:12px;overflow-x:auto;margin:6px 0">${code.trim()}</pre>`);
  // Inline code `code`
  html = html.replace(/`([^`\n]+)`/g, '<code style="background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px">$1</code>');
  // Bold **text** or __text__
  html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__([^_\n]+)__/g, '<strong>$1</strong>');
  // Italic *text* or _text_  (after bold)
  html = html.replace(/(^|[\s(])\*([^*\n]+)\*([\s).,;:!?]|$)/g, '$1<em>$2</em>$3');
  html = html.replace(/(^|[\s(])_([^_\n]+)_([\s).,;:!?]|$)/g, '$1<em>$2</em>$3');

  // Headings ### / ## / #
  html = html.replace(/^###\s+(.+)$/gm, '<div style="font-weight:700;font-size:14px;margin-top:8px;margin-bottom:4px">$1</div>');
  html = html.replace(/^##\s+(.+)$/gm, '<div style="font-weight:700;font-size:15px;margin-top:10px;margin-bottom:4px">$1</div>');
  html = html.replace(/^#\s+(.+)$/gm, '<div style="font-weight:700;font-size:16px;margin-top:10px;margin-bottom:6px">$1</div>');

  // Numbered lists: line starting with "1." "2." etc.
  html = html.replace(/^(\d+)\.\s+(.+)$/gm, '<div style="margin-left:18px;text-indent:-18px;margin-top:3px"><strong>$1.</strong> $2</div>');

  // Bullet lists: - item or * item
  html = html.replace(/^[-*]\s+(.+)$/gm, '<div style="margin-left:14px;text-indent:-10px;margin-top:3px">• $1</div>');

  // Links [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--gold-dark);text-decoration:underline">$1</a>');

  // Remaining newlines: collapse multiple, convert to <br>
  // Don't add <br> right after block elements (divs we just inserted)
  html = html
    .replace(/\n\n+/g, '\n\n')           // collapse 3+ newlines to 2
    .replace(/(<\/(div|pre)>)\n+/g, '$1') // strip newlines after block close
    .replace(/\n+(<(div|pre))/g, '$1')   // strip newlines before block open
    .replace(/\n/g, '<br>');

  return html;
}

function renderAiMsgs(){
  const c = $('#aiMsgs');
  if(!c) return;
  c.innerHTML = S.aiHistory.map((m, idx)=>{
    const isLast = idx === S.aiHistory.length - 1;
    const isBot = m.role !== 'user';
    // For user messages: escape HTML then convert real newlines to <br> (avoid pre-wrap collapsing template whitespace)
    const content = isBot ? renderMarkdown(m.text) : escapeHtml(m.text).replace(/\n/g, '<br>');
    const truncatedHtml = m.truncated
      ? `<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.1);font-size:11px;color:var(--orange);font-style:italic">⚠ Response was truncated (hit max length).${isBot && isLast ? ` <button onclick="continueAi()" class="btn btn-ghost btn-sm" style="margin-left:8px;padding:3px 10px;font-size:11px">Continue ▸</button>` : ''}</div>`
      : '';
    // Single-line template to avoid pre-wrap rendering template whitespace
    return `<div class="ai-msg ${m.role}">${content}${truncatedHtml}</div>`;
  }).join('');
  c.scrollTop = c.scrollHeight;
}

let _aiSending = false;
async function sendAi(){
  if(_aiSending) return; // prevent double-send while pending
  const input = $('#aiInput');
  const q = input.value.trim();
  if(!q) return;
  _aiSending = true;
  input.value='';
  // Disable input/button during send
  input.disabled = true;
  const sendBtn = $('#aiSend');
  if(sendBtn) sendBtn.disabled = true;

  addAiMsg('user', q);
  renderAiMsgs();

  // typing indicator
  const typingId = 'typing_'+Date.now();
  const typingEl = document.createElement('div');
  typingEl.className = 'ai-msg bot';
  typingEl.id = typingId;
  typingEl.textContent = '…';
  $('#aiMsgs').appendChild(typingEl);
  $('#aiMsgs').scrollTop = $('#aiMsgs').scrollHeight;

  let reply, truncated = false;
  try {
    if(S.geminiApiKey){
      try{
        const result = await callGemini(q);
        reply = result.text;
        truncated = result.truncated;
      }catch(e){
        console.warn('Gemini error:', e);
        reply = `(Gemini error — using local fallback)\n\n${aiReplyLocal(q)}`;
      }
    }else{
      reply = aiReplyLocal(q);
    }

    document.getElementById(typingId)?.remove();
    addAiMsg('bot', reply, {truncated});
    renderAiMsgs();
  } finally {
    _aiSending = false;
    input.disabled = false;
    if(sendBtn) sendBtn.disabled = false;
    input.focus();
  }
}

async function continueAi(){
  // Send a "continue" prompt to ask Gemini to keep going
  if(!S.geminiApiKey) return toast('Continue requires Gemini API key','error');

  // Mark the previous truncated message as no longer truncated (we're appending to it)
  const lastIdx = S.aiHistory.length - 1;
  if(lastIdx>=0 && S.aiHistory[lastIdx].role==='bot'){
    S.aiHistory[lastIdx].truncated = false;
  }
  renderAiMsgs();

  const typingId = 'typing_'+Date.now();
  const typingEl = document.createElement('div');
  typingEl.className = 'ai-msg bot';
  typingEl.id = typingId;
  typingEl.textContent = '…';
  $('#aiMsgs').appendChild(typingEl);
  $('#aiMsgs').scrollTop = $('#aiMsgs').scrollHeight;

  try{
    const result = await callGemini('Continue from where you left off. Don\'t repeat what you already said.');
    document.getElementById(typingId)?.remove();
    addAiMsg('bot', result.text, {truncated: result.truncated});
    renderAiMsgs();
  }catch(e){
    document.getElementById(typingId)?.remove();
    addAiMsg('bot', `(Failed to continue: ${e.message})`);
    renderAiMsgs();
  }
}

// ===== Gemini rate limiter + response cache =====
const _geminiCallLog = [];           // timestamps of last calls
const _geminiCache = new Map();      // cache: query → {text, truncated, ts}
const GEMINI_RATE_LIMIT_PER_MIN = 8; // stay under free tier 10/min
const GEMINI_CACHE_TTL_MS = 5*60*1000;

async function callGemini(userQ){
  // === Cache check — return cached response if same question asked < 5 min ago ===
  const cacheKey = (S.currentRole || 'anon') + '::' + userQ.trim().toLowerCase();
  const cached = _geminiCache.get(cacheKey);
  if(cached && Date.now() - cached.ts < GEMINI_CACHE_TTL_MS){
    console.log('[Gemini] Cache hit');
    return { text: cached.text + '\n\n_(Cached response from earlier)_', truncated: cached.truncated, finishReason: 'CACHED' };
  }

  // === Rate limit check — refuse if > 8 calls in last 60s ===
  const now = Date.now();
  while(_geminiCallLog.length && _geminiCallLog[0] < now - 60000){
    _geminiCallLog.shift();
  }
  if(_geminiCallLog.length >= GEMINI_RATE_LIMIT_PER_MIN){
    const waitSec = Math.ceil((_geminiCallLog[0] + 60000 - now) / 1000);
    throw new Error(`Rate limit reached (${GEMINI_RATE_LIMIT_PER_MIN}/min). Wait ${waitSec}s.`);
  }

  const ctx = buildContextSnapshot();
  const systemInstruction = `You are an AI assistant for Puregold.sg Thailand — a gold/silver retail business operating Gold ATM machines and online sales (Lazada). The user is ${S.currentRole}.

LANGUAGE: Respond in the language the user writes in (English, Thai, or Vietnamese). Match their tone.

STYLE: Be concise, practical, and ACTIONABLE. Format using simple markdown:
- Use **bold** for key numbers and product names
- Use bullet points (- item) for lists
- Use numbered lists (1. item) for steps
- Keep paragraphs short (2-3 lines max)

BEHAVIOR — Be PROACTIVE and CREATIVE:
- If the user has no open tasks → suggest things they could do (create content, photograph products, promote high-stock items, follow up on shipments, check ATM stock, organize inventory, write a Library article, etc.)
- If asked "what should I do?" → recommend 2-4 concrete actions based on current workspace state (low ATM stock, products with surplus, upcoming shipments, etc.)
- If a product has high stock → suggest promotional ideas (Lazada feature, Gold ATM placement, content angles)
- If an ATM is low → recommend restock priority
- If the user is the Manager → also think about delegation, performance review, monthly trends
- Don't just say "I don't have data" — make reasonable suggestions based on what you DO know

WORKSPACE DATA (use this to ground answers):
${ctx}`;

  const recent = S.aiHistory.slice(-8, -1);
  const contents = [];
  for(const m of recent){
    contents.push({
      role: m.role==='user'?'user':'model',
      parts: [{text: m.text}]
    });
  }
  contents.push({role:'user', parts:[{text: userQ}]});

  const body = {
    system_instruction: { parts:[{text: systemInstruction}] },
    contents,
    generationConfig: { temperature: 0.4, maxOutputTokens: 4096 }
  };

  // Record this call BEFORE making the request
  _geminiCallLog.push(Date.now());

  // Try models in order — stop early if we hit rate limit (all models share quota)
  const models = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-1.5-flash'];
  let lastErr;
  for(const model of models){
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(S.geminiApiKey)}`;
    try{
      const r = await fetch(url, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if(!r.ok){
        const errText = await r.text();
        lastErr = new Error(`HTTP ${r.status}: ${errText.slice(0,200)}`);
        // 429 = rate limit on shared quota — stop trying other models
        if(r.status === 429){
          throw new Error(`Gemini quota exceeded — please wait a minute. The free tier allows ~10 requests/minute across all 4 users.`);
        }
        if(r.status===404) continue;
        throw lastErr;
      }
      const data = await r.json();
      const candidate = data?.candidates?.[0];
      const text = candidate?.content?.parts?.[0]?.text;
      const finishReason = candidate?.finishReason || '';
      if(text){
        const result = {
          text: text.trim(),
          truncated: finishReason === 'MAX_TOKENS',
          finishReason
        };
        // Cache successful response
        _geminiCache.set(cacheKey, { text: result.text, truncated: result.truncated, ts: Date.now() });
        // Cap cache size
        if(_geminiCache.size > 30){
          const firstKey = _geminiCache.keys().next().value;
          _geminiCache.delete(firstKey);
        }
        return result;
      }
      throw new Error('Empty response');
    }catch(e){
      lastErr = e;
      if(e.message.includes('Failed to fetch')) throw e;
      if(e.message.includes('quota')) throw e; // already rate-limited, don't retry
    }
  }
  throw lastErr || new Error('All models failed');
}

function aiReplyLocal(q){
  const Q = q.toLowerCase();
  const isThai = /[\u0E00-\u0E7F]/.test(q);
  const t = (en, th) => isThai ? th : en;

  if(/task|งาน|ภารกิจ/.test(Q) && /(my|ของ|me|ฉัน|i)/.test(Q)){
    const mine = S.tasks.filter(x=>taskIsMine(x) && !x.done);
    if(mine.length===0) return t(`You have no open tasks. Nice ✨`, `คุณไม่มีงานที่ค้างอยู่ ดีมาก ✨`);
    return t(`You have ${mine.length} open task${mine.length>1?'s':''}:\n`, `คุณมี ${mine.length} งานที่ค้างอยู่:\n`) +
      mine.map(x=>`• [${priorityLabel(x.priority)}] ${x.title}`).join('\n');
  }
  if(/all task|task board|งานทั้งหมด/.test(Q)){
    const open = S.tasks.filter(t=>!t.done);
    return t(`${open.length} open tasks across the team. ${open.filter(x=>x.priority==='high').length} marked urgent.`,
             `${open.length} งานที่ค้างทั้งทีม ${open.filter(x=>x.priority==='high').length} งานเร่งด่วน`);
  }
  for(const a of S.atms){
    if(Q.includes(a.name.toLowerCase().split(' ')[0])){
      const total = S.products.reduce((s,p)=>s+(p.warehouses[a.name]||0),0);
      return t(`${a.name}: status ${a.status}, total stock ${total} units. Payment: ${(a.paymentMethods||[]).join(', ')}.`,
               `${a.name}: สถานะ ${a.status} สต็อกรวม ${total} ชิ้น`);
    }
  }
  if(/stock|inventory|tồn kho|สต็อก|สินค้า|คงคลัง/.test(Q)){
    const low = countLowStock();
    return t(`${low} item-locations are low (≤5 units). Open Inventory for details.`,
             `${low} รายการสต็อกต่ำ (≤5) เปิดหน้าคลังสินค้าดูรายละเอียดได้ครับ`);
  }
  if(/sale|sold|revenue|doanh số|ขาย|ยอดขาย/.test(Q)){
    const todayS = S.sales.filter(s=>new Date(s.date).toDateString()===new Date().toDateString());
    const total = todayS.reduce((a,b)=>a+b.price*b.qty,0);
    return t(`Today: ${todayS.length} sales, total ${fmtTHB(total)}.`, `วันนี้: ${todayS.length} รายการ ยอดรวม ${fmtTHB(total)}`);
  }
  if(/gold price|silver price|ราคาทอง|ราคาเงิน|giá vàng/.test(Q)){
    const upd = S.lastPriceUpdate?new Date(S.lastPriceUpdate).toLocaleString():'never';
    const goldBaht = Math.round((S.goldPriceTHB||0)*15.244);
    return t(`Gold ${fmtTHB(S.goldPriceTHB)}/g · Gold ${fmtTHB(goldBaht)}/baht · Silver ${fmtTHB(S.silverPriceTHB)}/g (updated ${upd}).`,
             `ทอง ${fmtTHB(S.goldPriceTHB)}/กรัม · ทอง ${fmtTHB(goldBaht)}/บาท · เงิน ${fmtTHB(S.silverPriceTHB)}/กรัม`);
  }
  if(/atm|machine|payment|เครื่อง/.test(Q)){
    const online = S.atms.filter(a=>a.status==='online').length;
    return t(`${online}/${S.atms.length} ATMs online. All accept Goldpay.sg, Card, and Thai QR.`,
             `ATM ออนไลน์ ${online}/${S.atms.length} เครื่อง รับ Goldpay.sg, บัตร, Thai QR`);
  }
  if(/help|what can you|làm được|ช่วย|ทำได้/.test(Q)){
    return t(`I can answer about: tasks, stock, sales, gold price, ATMs.\n(Local mode — for richer answers, ask Manager to set up Gemini API in Settings.)`,
             `ฉันสามารถตอบเรื่อง: งาน, สต็อก, ยอดขาย, ราคาทอง, สถานะ ATM\n(โหมดท้องถิ่น — ตอบดีขึ้นถ้า Manager ตั้งค่า Gemini API ใน Settings)`);
  }
  return t(`I can help with tasks, stock, sales, ATMs, and gold prices. Try: "my tasks", "stock at MBK", "sales today".`,
           `ฉันช่วยเรื่องงาน สต็อก ยอดขาย ATM และราคาทองได้ ลองถาม: "งานของฉัน", "สต็อก MBK", "ยอดขายวันนี้"`);
}

/* ====== GOLD PRICE — auto fetch from gold-api.com + frankfurter (USD→THB) ====== */
async function fetchGoldPrice(silent=false){
  $('#liveDot').style.background = 'var(--orange)';
  try{
    // 1. Get gold + silver in USD/oz from gold-api.com (free, CORS-enabled, no key)
    const [goldR, silverR] = await Promise.all([
      fetch('https://api.gold-api.com/price/XAU').then(r=>r.json()),
      fetch('https://api.gold-api.com/price/XAG').then(r=>r.json())
    ]);
    const goldUsdOz = goldR.price;
    const silverUsdOz = silverR.price;
    if(!goldUsdOz || !silverUsdOz) throw new Error('Bad gold-api response');

    // 2. Get USD→THB exchange rate from frankfurter.dev (free, no key, CORS)
    const fxR = await fetch('https://api.frankfurter.dev/v1/latest?from=USD&to=THB').then(r=>r.json());
    const usdToThb = fxR?.rates?.THB;
    if(!usdToThb) throw new Error('Bad FX response');

    // 3. Convert: 1 troy ounce = 31.1034768 grams
    const G_PER_OZ = 31.1034768;
    const goldThbPerGram = (goldUsdOz * usdToThb) / G_PER_OZ;
    const silverThbPerGram = (silverUsdOz * usdToThb) / G_PER_OZ;

    S.goldPriceUSD = goldUsdOz;
    S.silverPriceUSD = silverUsdOz;
    S.usdToThb = usdToThb;
    S.goldPriceTHB = Math.round(goldThbPerGram);
    S.silverPriceTHB = Math.round(silverThbPerGram*10)/10;
    S.lastPriceUpdate = Date.now();
    // Save WITHOUT bumping globalUpdatedAt — gold price is external API data, not a user change.
    // Pushing it would unnecessarily mark this device as "newer" and could overwrite real updates.
    try{ localStorage.setItem(KEY, JSON.stringify(S)) }catch(e){}
    updateTickerUI();
    $('#liveDot').style.background = 'var(--green)';
    if(!silent) toast('Gold/Silver prices updated ✓','success');
  }catch(e){
    console.warn('Price fetch failed:', e);
    $('#liveDot').style.background = 'var(--red)';
    if(!silent) toast('Auto-fetch failed. You can edit manually.','error');
  }
}

      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    </div>
  `);
});
function saveGoldPrice(){
  S.goldPriceTHB = parseFloat($('#gpGold').value)||S.goldPriceTHB;
  S.silverPriceTHB = parseFloat($('#gpSilver').value)||S.silverPriceTHB;
  S.lastPriceUpdate = Date.now();
  saveState(); updateTickerUI(); closeModal(); toast('Price saved','success');
}

/* ====== DAILY REMINDER ====== */
function scheduleDailyReminder(){
  const todayStr = today();
  const lastShown = localStorage.getItem('puregold_morning_'+S.currentRole);

  // Always show task reminder on each login (per request: "Task của nhân viên sẽ được push mỗi lần khi nhân viên đó log in")
  const myOpen = S.tasks.filter(t=>taskIsMine(t) && !t.done && !t.awaitingConfirm);
  const myAwaiting = S.tasks.filter(t=>taskIsMine(t) && t.awaitingConfirm && !t.done);
  if(myOpen.length>0 || myAwaiting.length>0){
    setTimeout(()=>{
      let msg = `☀️ Hi ${S.currentRole}! `;
      if(myOpen.length>0) msg += `${myOpen.length} open task${myOpen.length>1?'s':''}`;
      if(myAwaiting.length>0) msg += `${myOpen.length>0?', ':''}${myAwaiting.length} awaiting Manager confirm`;
      toast(msg);
    }, 1000);
  }

  // Shipment notifications — show daily once
  if(lastShown !== todayStr){
    const todayShipouts = S.shipments.filter(sh => sh.shipOutDate === todayStr && sh.status !== 'done');
    const sevenDayDeliveries = S.shipments.filter(sh => {
      if(!sh.deliveryDate || sh.status==='done') return false;
      const d = new Date(sh.deliveryDate);
      const diff = Math.ceil((d - new Date()) / 86400000);
      return diff >= 0 && diff <= 7;
    });

    let delay = 1800;
    todayShipouts.forEach(sh=>{
      setTimeout(()=>{
        pushNotifLocal(`📤 TODAY: Ship out "${sh.name}"`);
      }, delay);
      delay += 600;
    });
    sevenDayDeliveries.forEach(sh=>{
      const d = new Date(sh.deliveryDate);
      const days = Math.ceil((d - new Date()) / 86400000);
      setTimeout(()=>{
        pushNotifLocal(`📥 Delivery "${sh.name}" in ${days} day${days===1?'':'s'} (${sh.deliveryDate})`);
      }, delay);
      delay += 600;
    });

    // Manager: notify of tasks awaiting confirm
    if(isManager()){
      const awaitingTasks = S.tasks.filter(t=>t.awaitingConfirm && !t.done);
      if(awaitingTasks.length > 0){
        setTimeout(()=>{
          pushNotifLocal(`📋 ${awaitingTasks.length} task${awaitingTasks.length>1?'s':''} awaiting your confirmation`);
        }, delay);
      }
      // Manager: notify of shipments awaiting confirm
      const awaitingShips = S.shipments.filter(sh=>sh.status==='awaiting_confirm');
      if(awaitingShips.length > 0){
        setTimeout(()=>{
          pushNotifLocal(`📦 ${awaitingShips.length} shipment${awaitingShips.length>1?'s':''} awaiting your confirmation`);
        }, delay+700);
      }
    }

    try { localStorage.setItem('puregold_morning_'+S.currentRole, todayStr); }
    catch(e) { console.warn('localStorage save failed (Safari private?):', e); }
  }
}

/* ====== INIT ====== */
// Track session start to detect remote password change
let _sessionStartTime = Date.now();

function init(){
  // === ALWAYS pull from cloud on app load (before login screen renders) ===
  // This ensures: passwords, employees list, all data come from cloud, not stale DEFAULT_STATE.
  // Critical for guest browsers / fresh devices where localStorage is empty.
  if(S.cloudSync && S.cloudSync.enabled && S.cloudSync.binId){
    // Show "syncing..." state during initial pull
    pullFromCloud(true).then(()=>{
      initAfterPull();
    }).catch(()=>{
      // If pull fails (offline, etc), continue with local data
      initAfterPull();
    });
  } else {
    initAfterPull();
  }
}

function initAfterPull(){
  if(S.currentRole){
    $('#loginScreen').style.display='none';
    $('#app').style.display='block';
    $('#currentRole').textContent = S.currentRole;
    renderSidebar(); renderPage();
    updateTickerUI(); updateNotifBadge();
    scheduleDailyReminder();
    // Weekly auto-backup check (silent)
    const backupCreated = checkAutoBackup();
    // Save WITHOUT bumping globalUpdatedAt — auto-backup is local-only, not a real data change
    if(backupCreated){
      try{ localStorage.setItem(KEY, JSON.stringify(S)) }catch(e){}
    }
    if(Date.now() - S.lastPriceUpdate > 3600000){
      fetchGoldPrice(true);
    }
  }else{
    showRoleSelect();
    updateTickerUI();
    fetchGoldPrice(true);
  }
}
init();
