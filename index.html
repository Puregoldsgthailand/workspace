      <div class="flex gap-12 items-center flex-wrap">
        <div>
          <span class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;margin-right:8px;font-weight:600">Assignee</span>
          <select class="input" style="display:inline-block;width:auto" onchange="window.__taskFilter=this.value;renderPage()">
            <option value="all">All</option>
            ${S.employees.map(e=>`<option ${filterAssignee===e?'selected':''}>${escapeHtml(e)}</option>`).join('')}
          </select>
        </div>
        <div>
          <span class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;margin-right:8px;font-weight:600">Priority</span>
          <select class="input" style="display:inline-block;width:auto" onchange="window.__taskPrioFilter=this.value;renderPage()">
            <option value="all">All</option>
            <option value="high" ${filterPriority==='high'?'selected':''}>Urgent</option>
            <option value="mid" ${filterPriority==='mid'?'selected':''}>Medium</option>
            <option value="low" ${filterPriority==='low'?'selected':''}>Low</option>
          </select>
        </div>
        ${awaiting.length>0?`<div style="margin-left:auto;font-size:12px;color:var(--orange);font-weight:600">⏳ ${awaiting.length} awaiting your confirmation</div>`:''}
      </div>
    </div>

    <div class="kanban" style="grid-template-columns:repeat(3,1fr)">
      <div class="kanban-col">
        <h4>To do <span>${todo.length}</span></h4>
        ${todo.map(t=>taskCardHTML(t,'manager')).join('') || `<div class="empty"><div class="empty-title">Nothing pending</div></div>`}
      </div>
      <div class="kanban-col">
        <h4>Awaiting Confirm <span>${awaiting.length}</span></h4>
        ${awaiting.map(t=>taskCardHTML(t,'manager')).join('') || `<div class="empty"><div class="empty-title">No pending confirmations</div></div>`}
      </div>
      <div class="kanban-col">
        <h4>Done <span>${done.length}</span></h4>
        ${done.map(t=>taskCardHTML(t,'manager')).join('') || `<div class="empty"><div class="empty-title">No completed yet</div></div>`}
      </div>
    </div>
  `;
};

function priorityLabel(p){
  return p==='high' ? 'Urgent' : (p==='mid' ? 'Medium' : 'Low');
}

// Helper: get task assignees as array (handles both new .assignees array and old .assignee string)
function taskAssignees(t){
  if(Array.isArray(t.assignees) && t.assignees.length) return t.assignees;
  if(t.assignee) return [t.assignee];
  return [];
}
function taskIsMine(t){
  return taskAssignees(t).includes(S.currentRole);
}
function taskAssigneesLabel(t){
  return taskAssignees(t).join(', ') || '(unassigned)';
}

function taskCardHTML(t, viewMode='staff'){
  const prioClass = t.priority==='high'?'tag-high':(t.priority==='mid'?'tag-mid':'tag-low');
  const statusBadge = t.done ? `<span class="task-tag" style="background:var(--green-soft);color:var(--green)">✓ Done</span>` :
                      t.awaitingConfirm ? `<span class="task-tag" style="background:var(--orange-soft);color:var(--orange)">⏳ Awaiting</span>` : '';

  // Identify self-created tasks (createdBy stored when staff creates)
  const isSelfCreated = t.createdBy && t.createdBy !== 'Manager';
  const selfTag = isSelfCreated ? `<span class="task-tag" style="background:var(--blue-soft);color:var(--blue)">⌂ Self-created${isManager()?' by '+escapeHtml(t.createdBy):''}</span>` : '';

  // Action buttons depend on role and state
  let actions = '';
  if(isManager()){
    // Manager view
    if(!t.done){
      if(t.awaitingConfirm){
        actions = `
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();managerConfirmTask(${t.id})">✓ Confirm</button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();reopenTask(${t.id})">Reopen</button>
        `;
      } else {
        actions = `
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();managerMarkDone(${t.id})">✓ Mark done</button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();remindTask(${t.id})">Remind</button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openTaskDetail(${t.id})">Detail</button>
        `;
      }
    } else {
      actions = `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();reopenTask(${t.id})">Reopen</button>`;
    }
  } else {
    // Staff view
    if(taskIsMine(t)){
      if(!t.done && !t.awaitingConfirm){
        // Staff can edit self-created tasks before sending
        const editBtn = isSelfCreated && t.createdBy === S.currentRole
          ? `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openStaffTaskModal(${t.id})">Edit</button>`
          : '';
        // Different button text based on task origin
        const sendBtnLabel = isSelfCreated ? 'Send to Manager' : 'Done';
        actions = `
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openTaskDetail(${t.id})">Detail</button>
          ${editBtn}
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();staffMarkDone(${t.id})">${sendBtnLabel}</button>
        `;
      } else {
        actions = `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openTaskDetail(${t.id})">Detail</button>`;
      }
    } else {
      actions = `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openTaskDetail(${t.id})">Detail</button>`;
    }
  }

  return `
    <div class="task-card ${t.done?'done':''}" style="position:relative">
      ${isManager()?`<div class="task-actions"><button onclick="event.stopPropagation();deleteTask(${t.id})" title="Delete">×</button></div>`:''}
      <div class="task-title">${escapeHtml(t.title)}</div>
      <div class="task-meta" style="margin-bottom:10px">
        <span class="task-tag ${prioClass}">${priorityLabel(t.priority)}</span>
        <span class="task-tag" style="background:var(--soft);color:var(--text-dim)">${escapeHtml(t.category||'General')}</span>
        ${selfTag}
        ${statusBadge}
        <span class="task-assignee">→ ${escapeHtml(taskAssigneesLabel(t))}</span>
        ${t.due?`<span class="task-due">Due ${t.due}</span>`:''}
      </div>
      <div class="flex gap-8" style="flex-wrap:wrap">${actions}</div>
    </div>
  `;
}

function openTaskDetail(id){
  const t = S.tasks.find(x=>x.id===id);
  if(!t) return;
  const prioClass = t.priority==='high'?'tag-high':(t.priority==='mid'?'tag-mid':'tag-low');
  const status = t.done ? 'Done' : (t.awaitingConfirm ? 'Awaiting Manager confirmation' : 'Open');
  modal(`
    <h3>${escapeHtml(t.title)}</h3>
    <div class="flex gap-8 flex-wrap mb-16">
      <span class="task-tag ${prioClass}">${priorityLabel(t.priority)}</span>
      <span class="task-tag" style="background:var(--soft);color:var(--text-dim)">${escapeHtml(t.category||'General')}</span>
      <span class="task-tag" style="background:var(--blue-soft);color:var(--blue)">${escapeHtml(status)}</span>
    </div>
    <div style="font-size:13px;line-height:1.7;color:var(--text-dim)">
      <div><strong style="color:var(--text)">Assigned to:</strong> ${escapeHtml(taskAssigneesLabel(t))}</div>
      ${t.due?`<div><strong style="color:var(--text)">Due date:</strong> ${escapeHtml(t.due)}</div>`:''}
      <div><strong style="color:var(--text)">Created:</strong> ${new Date(t.createdAt).toLocaleString()}</div>
      ${t.description?`<div style="margin-top:12px"><strong style="color:var(--text)">Description:</strong><br>${escapeHtml(t.description)}</div>`:''}
      ${t.lastReminderAt?`<div style="margin-top:8px;color:var(--orange)"><strong>Last reminded:</strong> ${new Date(t.lastReminderAt).toLocaleString()}</div>`:''}
      ${t.markedDoneAt?`<div style="margin-top:8px"><strong style="color:var(--text)">Marked done by staff at:</strong> ${new Date(t.markedDoneAt).toLocaleString()}</div>`:''}
      ${t.confirmedAt?`<div><strong style="color:var(--text)">Confirmed by Manager at:</strong> ${new Date(t.confirmedAt).toLocaleString()}</div>`:''}
    </div>
    <div class="flex gap-8" style="margin-top:18px">
      ${isManager() && t.awaitingConfirm ? `<button class="btn btn-primary" onclick="managerConfirmTask(${t.id});closeModal()">✓ Confirm completion</button>` : ''}
      ${isManager() && !t.done && !t.awaitingConfirm ? `<button class="btn btn-primary" onclick="managerMarkDone(${t.id});closeModal()">✓ Mark done</button>` : ''}
      ${isManager() && !t.done && !t.awaitingConfirm ? `<button class="btn btn-ghost" onclick="remindTask(${t.id});closeModal()">Send reminder</button>` : ''}
      ${!isManager() && taskIsMine(t) && !t.done && !t.awaitingConfirm ? `<button class="btn btn-primary" onclick="staffMarkDone(${t.id});closeModal()">Mark Done</button>` : ''}
      ${isManager() ? `<button class="btn btn-ghost" onclick="openEditTaskModal(${t.id})">Edit</button>` : ''}
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    </div>
  `);
}

function staffMarkDone(id){
  const t = S.tasks.find(x=>x.id===id);
  if(!t) return;
  if(!taskIsMine(t) && !isManager()) return toast('Not your task','error');
  t.awaitingConfirm = true;
  t.markedDoneAt = Date.now();
  t.updatedAt = Date.now();
  t.updatedBy = S.currentRole;
  // Notify Manager — different text for self-created tasks
  const isSelfCreated = t.createdBy && t.createdBy !== 'Manager';
  const notifText = isSelfCreated
    ? `⌂ ${S.currentRole} completed self-task: "${t.title}" — please review`
    : `✓ ${S.currentRole} marked done: "${t.title}" — awaiting your confirmation`;
  S.notifications.push({
    id: Date.now()+Math.random(),
    text: notifText,
    read: false,
    ts: Date.now(),
    forUser: 'Manager'
  });
  pushAuditLog('task.done', `Task #${id} "${t.title}" sent to Manager${isSelfCreated?' (self-created)':''}`);
  saveState(); renderPage();
  toast(isSelfCreated ? 'Sent to Manager for review' : 'Submitted for Manager confirmation','success');
}

function managerConfirmTask(id){
  if(!isManager()) return toast('Only Manager can confirm','error');
  const t = S.tasks.find(x=>x.id===id);
  if(!t) return;
  t.done = true;
  t.awaitingConfirm = false;
  t.confirmedAt = Date.now();
  t.updatedAt = Date.now();
  t.updatedBy = S.currentRole;
  // Notify all assignees that Manager confirmed
  taskAssignees(t).forEach(a=>{
    S.notifications.push({
      id: Date.now() + Math.random(),
      text: `✓ Manager confirmed: "${t.title}"`,
      read: false, ts: Date.now(), forUser: a
    });
  });
  pushAuditLog('task.confirm', `Task #${id} "${t.title}" confirmed done`);
  saveState(); renderPage();
  toast(`Task confirmed done ✓`,'success');
}

function managerMarkDone(id){
  if(!isManager()) return toast('Only Manager can do this','error');
  const t = S.tasks.find(x=>x.id===id);
  if(!t) return;
  t.done = true;
  t.awaitingConfirm = false;
  t.confirmedAt = Date.now();
  if(!t.markedDoneAt) t.markedDoneAt = Date.now();
  t.updatedAt = Date.now();
  t.updatedBy = S.currentRole;
  // Notify assignees (other than the Manager) that the task was completed
  taskAssignees(t).forEach(a=>{
    if(a==='Manager') return;
    S.notifications.push({
      id: Date.now()+Math.random(),
      text: `✓ Manager marked done: "${t.title}"`,
      read:false, ts:Date.now(), forUser:a
    });
  });
  pushAuditLog('task.managerdone', `Task #${id} "${t.title}" marked done by Manager`);
  saveState(); renderPage();
  toast('Task marked done ✓','success');
}

function reopenTask(id){
  if(!isManager()) return;
  const t = S.tasks.find(x=>x.id===id);
  if(!t) return;
  t.done = false;
  t.awaitingConfirm = false;
  t.markedDoneAt = null;
  t.confirmedAt = null;
  t.updatedAt = Date.now();
  t.updatedBy = S.currentRole;
  pushAuditLog('task.reopen', `Task #${id} "${t.title}" reopened`);
  saveState(); renderPage();
  toast('Task reopened','success');
}

function remindTask(id){
  if(!isManager()) return;
  const t = S.tasks.find(x=>x.id===id);
  if(!t) return;
  t.lastReminderAt = Date.now();
  // Send to all assignees
  const assignees = taskAssignees(t);
  for(const a of assignees){
    S.notifications.push({
      id: Date.now() + Math.random(),
      text: `⏰ Reminder from Manager: "${t.title}"`,
      read: false,
      ts: Date.now(),
      forUser: a
    });
  }
  pushAuditLog('task.remind', `Task #${id} reminded → ${assignees.join(', ')}`);
  saveState();
  updateNotifBadge();
  renderPage();
  toast(`Reminder sent to ${assignees.join(', ')}`,'success');
  // Telegram notification — use reminder timestamp to allow multiple reminders for same task
  const reminderKey = `${id}_${Math.floor(t.lastReminderAt/60000)}`; // minute-level granularity
  sendTelegram(tgFormatReminder(t), 'task.remind', reminderKey, { notifyKey: 'reminder' });
}

function openEditTaskModal(id){
  if(!isManager()) return;
  const t = S.tasks.find(x=>x.id===id);
  if(!t) return;
  if(!S.taskCategories) S.taskCategories = ['General','Sales','Marketing','Accountant','Gold ATM'];
  const currentAssignees = t.assignees || (t.assignee ? [t.assignee] : []);
  // Snapshot updatedAt at time of opening — used to detect concurrent edits
  window.__editTaskSnapshot = {id, updatedAt: t.updatedAt || 0};
  // Category from existing or default
  const currentCat = t.category || 'General';
  const catInList = S.taskCategories.includes(currentCat);
  modal(`
    <h3>Edit Task</h3>
    <div class="form-row"><label class="label">Title</label><input class="input" id="etTitle" value="${escapeHtml(t.title)}"></div>
    <div class="form-row">
      <label class="label">Assign to (one or more)</label>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;max-height:160px;overflow-y:auto;border:1px solid var(--line);border-radius:6px;padding:8px">
        ${S.employees.map(e=>`
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" data-etassign-cb value="${escapeHtml(e)}" ${currentAssignees.includes(e)?'checked':''}>
            <span>${escapeHtml(e)}</span>
          </label>
        `).join('')}
      </div>
    </div>
    <div class="input-row">
      <div class="form-row" style="flex:1"><label class="label">Priority</label>
        <select class="input" id="etPrio">
          <option value="low" ${t.priority==='low'?'selected':''}>Low</option>
          <option value="mid" ${t.priority==='mid'?'selected':''}>Medium</option>
          <option value="high" ${t.priority==='high'?'selected':''}>Urgent</option>
        </select>
      </div>
      <div class="form-row" style="flex:1"><label class="label">Category</label>
        <select class="input" id="etCat">
          ${S.taskCategories.map(c=>`<option value="${escapeHtml(c)}" ${c===currentCat?'selected':''}>${escapeHtml(c)}</option>`).join('')}
          ${!catInList && currentCat ? `<option value="${escapeHtml(currentCat)}" selected>${escapeHtml(currentCat)} (legacy)</option>` : ''}
        </select>
      </div>
    </div>
    <div class="form-row"><label class="label">Due date</label><input class="input" id="etDue" type="date" value="${escapeHtml(t.due||'')}"></div>
    <div class="form-row"><label class="label">Description (optional)</label>
      <textarea class="input" id="etDesc">${escapeHtml(t.description||'')}</textarea>
    </div>
    <div class="flex gap-8" style="margin-top:18px">
      <button class="btn btn-primary" onclick="saveEditedTask(${id})">Save</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);
}
function saveEditedTask(id){
  const t = S.tasks.find(x=>x.id===id);
  if(!t) return;
  // Conflict check
  const snap = window.__editTaskSnapshot;
  if(snap && snap.id === id && (t.updatedAt||0) > (snap.updatedAt||0) + 100){
    if(!confirm(`⚠ Someone else just changed this task (${escapeHtml(t.updatedBy||'?')} at ${new Date(t.updatedAt).toLocaleTimeString()}).\n\nSave anyway will overwrite their changes.\n\nClick OK to overwrite, or Cancel to close and refresh.`)){
      closeModal(); renderPage();
      return;
    }
  }
  const title = $('#etTitle').value.trim();
  if(!title) return toast('Title required','error');
  const assignees = [...document.querySelectorAll('[data-etassign-cb]:checked')].map(cb=>cb.value);
  if(assignees.length===0) return toast('Assign to at least one person','error');
  t.title = title;
  t.assignees = assignees;
  t.assignee = assignees[0]; // legacy compat
  t.priority = $('#etPrio').value;
  t.category = $('#etCat').value.trim() || 'General';
  t.due = $('#etDue').value;
  t.description = $('#etDesc').value;
  t.updatedAt = Date.now();
  t.updatedBy = S.currentRole;
  pushAuditLog('task.edit', `Task #${id}: "${title}" → ${assignees.join(', ')}`);
  delete window.__editTaskSnapshot;
  saveState(); closeModal(); renderPage();
  toast('Task updated','success');
}

/* ---------- MY TASKS ---------- */
pageRenderers.mytasks = (m) => {
  const mine = S.tasks.filter(t=>taskIsMine(t));
  const prioRank = {high:0, mid:1, low:2};
  const sortFn = (a,b)=>{
    const pa = prioRank[a.priority] ?? 99;
    const pb = prioRank[b.priority] ?? 99;
    if(pa !== pb) return pa - pb;
    const ta = a.due ? new Date(a.due).getTime() : Infinity;
    const tb = b.due ? new Date(b.due).getTime() : Infinity;
    if(ta !== tb) return ta - tb;
    return (a.createdAt||0) - (b.createdAt||0);
  };
  const open = mine.filter(t=>!t.done && !t.awaitingConfirm).sort(sortFn);
  const awaiting = mine.filter(t=>!t.done && t.awaitingConfirm).sort((a,b)=>(b.markedDoneAt||0)-(a.markedDoneAt||0));
  const done = mine.filter(t=>t.done).sort((a,b)=>(b.confirmedAt||b.markedDoneAt||0)-(a.confirmedAt||a.markedDoneAt||0));

  m.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-sub">Your work</div>
        <h1 class="page-title editable" data-edit="navLabels.mytasks">${escapeHtml(S.navLabels.mytasks)}</h1>
      </div>
      <div class="flex gap-8 items-center flex-wrap">
        <div class="muted">${open.length} open · ${awaiting.length} awaiting · ${done.length} done</div>
        <button class="btn btn-primary" onclick="openStaffTaskModal()">+ New Task</button>
      </div>
    </div>

    <div class="card" style="padding:10px 14px;margin-bottom:14px;background:var(--gold-soft);border:1px solid var(--gold-dark);font-size:12px">
      <strong>Tip:</strong> You can create tasks for yourself (e.g., personal goals, learning items). Click <strong>Send to Manager</strong> when done — Manager will review and confirm.
    </div>

    <div class="kanban" style="grid-template-columns:repeat(3,1fr)">
      <div class="kanban-col">
        <h4>To do <span>${open.length}</span></h4>
        ${open.map(t=>taskCardHTML(t,'staff')).join('') || `<div class="empty"><div class="empty-title">All caught up ✨</div></div>`}
      </div>
      <div class="kanban-col">
        <h4>Awaiting Manager <span>${awaiting.length}</span></h4>
        ${awaiting.map(t=>taskCardHTML(t,'staff')).join('') || `<div class="empty"><div class="empty-title">None pending</div></div>`}
      </div>
      <div class="kanban-col">
        <h4>Done <span>${done.length}</span></h4>
        ${done.map(t=>taskCardHTML(t,'staff')).join('') || `<div class="empty"><div class="empty-title">Nothing yet</div></div>`}
      </div>
    </div>
  `;
};

/* ---------- SALES ---------- */
pageRenderers.sales = (m) => {
  const sortedSales = [...S.sales].sort((a,b)=>b.date-a.date);
  const todaySales = sortedSales.filter(s=>{
    const d=new Date(s.date); return d.toDateString()===new Date().toDateString();
  });
  const monthSales = sortedSales.filter(s=>{
    const d=new Date(s.date); const n=new Date();
    return d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
  });
  const totalToday = todaySales.reduce((a,b)=>a+b.price*b.qty,0);
  const totalMonth = monthSales.reduce((a,b)=>a+b.price*b.qty,0);
  const onlineMonth = monthSales.filter(s=>s.channel==='Online').reduce((a,b)=>a+b.price*b.qty,0);
  const atmMonth = monthSales.filter(s=>s.channel==='ATM').reduce((a,b)=>a+b.price*b.qty,0);

  const goldpayMonth = monthSales.filter(s=>s.channel==='ATM' && s.payment==='Goldpay.sg').reduce((a,b)=>a+b.price*b.qty,0);
  const cardMonth = monthSales.filter(s=>s.channel==='ATM' && s.payment==='Card').reduce((a,b)=>a+b.price*b.qty,0);
  const qrMonth = monthSales.filter(s=>s.channel==='ATM' && s.payment==='Thai QR').reduce((a,b)=>a+b.price*b.qty,0);

  // Determine which sales to show based on filter
  const filter = window.__salesFilter || 'today';
  const monthYr = window.__salesMonthYear || ''; // 'YYYY-MM' format for month picker
  const rangeFrom = window.__salesRangeFrom || ''; // 'YYYY-MM-DD'
  const rangeTo = window.__salesRangeTo || '';
  let displaySales = sortedSales;
  let filterLabel = 'All transactions';
  if(filter==='today'){ displaySales = todaySales; filterLabel = "Today's transactions"; }
  else if(filter==='month'){ displaySales = monthSales; filterLabel = "This month's transactions"; }
  else if(filter==='online'){ displaySales = monthSales.filter(s=>s.channel==='Online'); filterLabel = "Online (this month)"; }
  else if(filter==='atm'){ displaySales = monthSales.filter(s=>s.channel==='ATM'); filterLabel = "ATM (this month)"; }
  else if(filter==='goldpay'){ displaySales = monthSales.filter(s=>s.payment==='Goldpay.sg'); filterLabel = "Goldpay.sg (this month)"; }
  else if(filter==='card'){ displaySales = monthSales.filter(s=>s.payment==='Card'); filterLabel = "Card payment (this month)"; }
  else if(filter==='qr'){ displaySales = monthSales.filter(s=>s.payment==='Thai QR'); filterLabel = "Thai QR (this month)"; }
  else if(filter==='specific-month' && monthYr){
    const [yr, mo] = monthYr.split('-').map(Number);
    displaySales = sortedSales.filter(s=>{
      const d = new Date(s.date);
      return d.getFullYear()===yr && d.getMonth()===mo-1;
    });
    const monthName = new Date(yr, mo-1).toLocaleDateString('en-US',{month:'long', year:'numeric'});
    filterLabel = `${monthName}`;
  }
  else if(filter==='range' && rangeFrom && rangeTo){
    const fromTs = new Date(rangeFrom+'T00:00:00').getTime();
    const toTs = new Date(rangeTo+'T23:59:59').getTime();
    displaySales = sortedSales.filter(s=>s.date>=fromTs && s.date<=toTs);
    filterLabel = `${rangeFrom} → ${rangeTo}`;
  }
  else if(filter==='all'){ displaySales = sortedSales; filterLabel = `All transactions (lifetime)`; }

  const displayTotal = displaySales.reduce((a,b)=>a+b.price*b.qty,0);

  m.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-sub">Revenue</div>
        <h1 class="page-title editable" data-edit="navLabels.sales">${escapeHtml(S.navLabels.sales)}</h1>
      </div>

function updateEditSalePaymentVisibility(){
  const v = $('#esWh')?.value || '';
  const isAtm = v.startsWith('ATM::');

function saveEditedSale(id){
  const s = S.sales.find(x=>x.id===id);
  if(!s) return;
  if(!isManager() && s.staff !== S.currentRole) return toast('Cannot edit others\' sales','error');
  // Conflict check
  const snap = window.__editSaleSnapshot;
  if(snap && snap.id === id && (s.updatedAt||0) > (snap.updatedAt||0) + 100){
    if(!confirm(`⚠ Someone else just changed this sale (${escapeHtml(s.updatedBy||'?')} at ${new Date(s.updatedAt).toLocaleTimeString()}).\n\nSave anyway will overwrite their changes.\n\nClick OK to overwrite, or Cancel to close and refresh.`)){
      closeModal(); renderPage();
      return;
    }
  }
  const pid = $('#esProd').value;
  const prod = S.products.find(p=>p.id===pid);
  if(!prod) return toast('Product not found','error');
  const qty = parseInt($('#esQty').value)||0;
  const price = parseInt($('#esPrice').value)||0;
  const [channel, warehouse] = $('#esWh').value.split('::');
  const payment = (channel==='ATM') ? $('#esPayment').value : '';
  const dateStr = $('#esDate').value;
  const date = dateStr ? new Date(dateStr).getTime() : s.date;
  if(qty<=0 || price<=0) return toast('Invalid quantity or price','error');

  // === Adjust inventory ===
  // Step 1: refund old sale to original product/warehouse (if still exists)
  const oldProd = S.products.find(p=>p.id===s.productId);
  if(oldProd && s.warehouse){
    oldProd.warehouses[s.warehouse] = (oldProd.warehouses[s.warehouse]||0) + s.qty;
  }
  // Step 2: deduct new sale from new product/warehouse
  const available = prod.warehouses[warehouse]||0;
  if(available < qty){
    if(!confirm(`Only ${available} in stock at ${warehouse} (after refunding old sale). Save anyway? Stock will go to 0.`)){
      // Revert step 1 since user cancelled
      if(oldProd && s.warehouse) oldProd.warehouses[s.warehouse] = (oldProd.warehouses[s.warehouse]||0) - s.qty;
      return;
    }
  }
  prod.warehouses[warehouse] = Math.max(0, available - qty);

  s.productId = pid;
  s.productName = prod.name;
  s.qty = qty;
  s.price = price;
  s.channel = channel;
  s.warehouse = warehouse;
  s.payment = payment;
  s.date = date;
  s.updatedAt = Date.now();
  s.updatedBy = S.currentRole;
  pushAuditLog('sale.edit', `Sale #${id}: ${qty}× ${prod.name} @ ${warehouse}`);
  saveState(); closeModal(); renderPage();
  toast('Sale updated · stock adjusted','success');
}
function deleteSale(id){
  const s = S.sales.find(x=>x.id===id);
  if(!s) return;
  if(!isManager() && s.staff !== S.currentRole) return toast('Cannot delete others\' sales','error');
  if(!confirm(`Delete this sale of ${s.qty} × ${s.productName}?\n\nStock will be REFUNDED to ${s.warehouse}.`)) return;

  // Refund stock
  const prod = S.products.find(p=>p.id===s.productId);
  if(prod && s.warehouse){
    prod.warehouses[s.warehouse] = (prod.warehouses[s.warehouse]||0) + s.qty;
  }
  pushAuditLog('sale.delete', `Sale #${id}: ${s.qty}× ${s.productName} @ ${s.warehouse} (${fmtTHB(s.qty*s.price)})`);
  S.sales = S.sales.filter(x=>x.id!==id);
  saveState(); renderPage();
  toast(`Sale deleted · ${prod ? s.qty+' refunded to '+s.warehouse : 'product no longer exists'}`,'success');
}

function exportSalesExcel(){
  // Use current filter so user can export "Today" or "This month" subsets
  const filter = window.__salesFilter || 'today';
  const sortedSales = [...S.sales].sort((a,b)=>b.date-a.date);
  let data = sortedSales;
  let scopeLabel = 'All';
  const now = new Date();
  if(filter==='today'){
    data = sortedSales.filter(s => new Date(s.date).toDateString() === now.toDateString());
    scopeLabel = 'Today';
  } else if(filter==='month'){
    data = sortedSales.filter(s => {
      const d = new Date(s.date);
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    });
    scopeLabel = 'ThisMonth';
  } else if(filter==='online'){
    data = sortedSales.filter(s => {
      const d = new Date(s.date);
      return s.channel==='Online' && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    });
    scopeLabel = 'Online';
  } else if(filter==='atm'){
    data = sortedSales.filter(s => {
      const d = new Date(s.date);
      return s.channel==='ATM' && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    });
    scopeLabel = 'ATM';
  } else if(filter==='goldpay' || filter==='card' || filter==='qr'){
    const map = {goldpay:'Goldpay.sg', card:'Card', qr:'Thai QR'};
    data = sortedSales.filter(s => {
      const d = new Date(s.date);
      return s.payment===map[filter] && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    });
    scopeLabel = map[filter].replace('.','').replace(' ','');
  } else if(filter==='specific-month' && window.__salesMonthYear){
    const [yr, mo] = window.__salesMonthYear.split('-').map(Number);
    data = sortedSales.filter(s=>{
      const d = new Date(s.date);
      return d.getFullYear()===yr && d.getMonth()===mo-1;
    });
    scopeLabel = window.__salesMonthYear;
  } else if(filter==='range' && window.__salesRangeFrom && window.__salesRangeTo){
    const fromTs = new Date(window.__salesRangeFrom+'T00:00:00').getTime();
    const toTs = new Date(window.__salesRangeTo+'T23:59:59').getTime();
    data = sortedSales.filter(s=>s.date>=fromTs && s.date<=toTs);
    scopeLabel = `${window.__salesRangeFrom}_to_${window.__salesRangeTo}`;
  } else if(filter==='all'){
    data = sortedSales;
    scopeLabel = 'AllTime';
  }

  if(data.length===0){
    return toast('No sales in current view to export','error');
  }

  // Build sheet
  const rows = [
    ['Date','Time','Product ID','Product Name','Quantity','Price (THB)','Total (THB)','Channel','Warehouse','Payment','Staff'],
    ...data.map(s => {
      const d = new Date(s.date);
      return [
        d.toLocaleDateString('en-GB'),
        d.toLocaleTimeString('en-GB'),
        s.productId || '',
        s.productName || '',
        s.qty,
        s.price,
        s.qty * s.price,
        s.channel || '',
        s.warehouse || '',
        s.payment || '',
        s.staff || ''
      ];
    })
  ];

  // Add summary row
  const totalQty = data.reduce((a,b)=>a+b.qty,0);
  const totalRevenue = data.reduce((a,b)=>a+b.qty*b.price,0);
  rows.push([]);
  rows.push(['','','','TOTAL', totalQty, '', totalRevenue, '', '', '', '']);

  try{
    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Column widths
    ws['!cols'] = [{wch:11},{wch:11},{wch:10},{wch:26},{wch:8},{wch:10},{wch:12},{wch:10},{wch:18},{wch:12},{wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Sales');
    const fname = `puregold_sales_${scopeLabel}_${today()}.xlsx`;
    XLSX.writeFile(wb, fname);
    pushAuditLog('sales.export', `${data.length} sales exported (${scopeLabel})`);
    saveState();
    toast(`Exported ${data.length} sales (${fmtTHB(totalRevenue)})`,'success');
  }catch(e){
    toast('Export failed: '+e.message,'error');
    console.error(e);
  }
}

/* ---------- CALENDAR ---------- */
let calMonth = new Date();
pageRenderers.calendar = (m) => {
  const year = calMonth.getFullYear();
  const month = calMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  const startWeekDay = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  const monthName = calMonth.toLocaleString('en-US',{month:'long', year:'numeric'});

  const attendance = {};
  S.employees.forEach(e=>attendance[e]=0);
  for(const dk in S.officeSchedule){
    const d = new Date(dk);
    if(d.getMonth()===month && d.getFullYear()===year){
      S.officeSchedule[dk].forEach(emp=>{
        if(attendance[emp]!==undefined) attendance[emp]++;
      });
    }
  }

  let cells = '';
  for(let i=0;i<startWeekDay;i++){
    cells += `<div class="cal-cell other-month"></div>`;
  }
  for(let d=1; d<=daysInMonth; d++){
    const dateObj = new Date(year, month, d);
    const dk = dateKey(dateObj);
    const isToday = dk === today();
    const officeStaff = S.officeSchedule[dk] || [];
    const outDays = (S.officeOutDays && S.officeOutDays[dk]) || [];
    const tasksOnDay = S.tasks.filter(t=>t.due===dk);

    shipOuts.forEach(sh=>events.push(`<div class="cal-event" style="border-left-color:#4A7CA8;background:#E5EEF6;color:#2A5A88" title="Ship out: ${escapeHtml(sh.name)}">📤 Ship: ${escapeHtml(sh.name.slice(0,12))}</div>`));
    deliveries.forEach(sh=>events.push(`<div class="cal-event" style="border-left-color:#7BA05B;background:#E9F2E0;color:#4A6B30" title="Delivery: ${escapeHtml(sh.name)}">📥 Deliver: ${escapeHtml(sh.name.slice(0,10))}</div>`));

    cells += `<div class="cal-cell ${isToday?'today':''}" onclick="openCalDay('${dk}')">

  m.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-sub">Planning</div>
        <h1 class="page-title editable" data-edit="navLabels.calendar">${escapeHtml(S.navLabels.calendar)}</h1>
      </div>
      <div class="flex gap-8">
        <button class="btn btn-ghost btn-sm" onclick="changeMonth(-1)">←</button>
        <button class="btn btn-ghost btn-sm" onclick="changeMonth(0)">Today</button>
        <button class="btn btn-ghost btn-sm" onclick="changeMonth(1)">→</button>
      </div>
    </div>

    <div class="cal-header">
      <h2 style="font-size:22px">${monthName}</h2>
      <div class="muted" style="font-size:12px">Each employee should be at office <strong style="color:var(--gold-dark)">≥6 days/month</strong></div>
    </div>

    <div class="grid grid-4 mb-24">
      ${S.employees.map(e=>{
        const c = attendance[e]||0;
        const ok = c>=6;
        return `<div class="card">
          <div class="card-title">${escapeHtml(e)}</div>
          <div class="card-value" style="${ok?'color:var(--green)':'color:var(--orange)'}">${c}<span style="color:var(--text-muted);font-size:16px"> / 6</span></div>
          <div class="card-meta">${ok?'✓ On track':'Below minimum'}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-day-header">${d}</div>`).join('')}
      ${cells}
    </div>

    <div class="section">
      <div class="section-title">Legend</div>
      <div class="flex gap-16 flex-wrap muted" style="font-size:12px">
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--orange);border-radius:2px;margin-right:6px"></span>Task due</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#D89344;border-radius:2px;margin-right:6px"></span>Out-of-office (field work)</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#4A7CA8;border-radius:2px;margin-right:6px"></span>Shipment ship out</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#7BA05B;border-radius:2px;margin-right:6px"></span>Shipment delivery</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#8B6FC9;border-radius:2px;margin-right:6px"></span>Custom event</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#D17A8E;border-radius:2px;margin-right:6px"></span>Poon @office</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#5A8FC2;border-radius:2px;margin-right:6px"></span>Jump @office</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#8B6FC9;border-radius:2px;margin-right:6px"></span>Carly @office</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#5AAB80;border-radius:2px;margin-right:6px"></span>Guest @office</span>
      </div>
    </div>
  `;
};
function changeMonth(dir){
  if(dir===0) calMonth = new Date();
  else calMonth.setMonth(calMonth.getMonth()+dir);
  renderPage();
}

function openCalDay(dk){
  const current = S.officeSchedule[dk] || [];
  if(!S.officeOutDays) S.officeOutDays = {};
  if(!S.customEvents) S.customEvents = {};
  const outDays = S.officeOutDays[dk] || [];
  const customEvs = S.customEvents[dk] || [];
  const tasksOnDay = S.tasks.filter(t=>t.due===dk);
  const shipOuts = S.shipments.filter(sh=>sh.shipOutDate===dk);
  const deliveries = S.shipments.filter(sh=>sh.deliveryDate===dk);

  // Parse date string as LOCAL date (not UTC) to avoid timezone shift
  const [yr, mo, dy] = dk.split('-').map(Number);
  const localDate = new Date(yr, mo-1, dy);

  modal(`
    <h3>${localDate.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric', year:'numeric'})}</h3>

    ${tasksOnDay.length || shipOuts.length || deliveries.length ? `
      <div class="card" style="background:var(--soft);padding:12px;margin-bottom:14px;border:none">
        <div class="muted" style="font-size:10px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;margin-bottom:6px">On this day</div>
        ${tasksOnDay.map(t=>`<div style="font-size:12px;margin-bottom:4px">★ Task: ${escapeHtml(t.title)} → ${escapeHtml(taskAssigneesLabel(t))}</div>`).join('')}
        ${shipOuts.map(sh=>`<div style="font-size:12px;margin-bottom:4px;color:#2A5A88">📤 Ship out: ${escapeHtml(sh.name)}</div>`).join('')}
        ${deliveries.map(sh=>`<div style="font-size:12px;margin-bottom:4px;color:#4A6B30">📥 Delivery: ${escapeHtml(sh.name)}</div>`).join('')}
      </div>
    ` : ''}

    <div class="form-row">
      <label class="label">At the office</label>
      ${S.employees.map(e=>`
        <div style="margin-bottom:6px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" ${current.includes(e)?'checked':''} value="${escapeHtml(e)}" id="off_${escapeHtml(e)}">
            <span>${escapeHtml(e)}</span>
          </label>
        </div>
      `).join('')}
    </div>

    <div class="form-row" style="border-top:1px solid var(--line);padding-top:14px;margin-top:14px">
      <label class="label">Out-of-office (field work, customer visit, etc.)</label>
      <div id="outRows">
        ${outDays.map((o,i)=>`
          <div class="flex gap-8" style="margin-bottom:6px;align-items:center" data-out-row>
            <select class="input" data-out-emp style="flex:0 0 auto;width:110px">
              ${S.employees.map(e=>`<option ${o.employee===e?'selected':''}>${escapeHtml(e)}</option>`).join('')}
            </select>
            <input class="input" data-out-purpose style="flex:1" value="${escapeHtml(o.purpose||'')}" placeholder="Purpose / location">
            <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('[data-out-row]').remove()">×</button>
          </div>
        `).join('')}
      </div>
      <button type="button" class="btn btn-ghost btn-sm" onclick="addOutRow()">+ Add field work</button>
    </div>

    <div class="form-row" style="border-top:1px solid var(--line);padding-top:14px;margin-top:14px">
      <label class="label">Custom events</label>
      <div id="evRows">
        ${customEvs.map((ev,i)=>`
          <div class="flex gap-8" style="margin-bottom:6px;align-items:center" data-ev-row>
            <input class="input" data-ev-title style="flex:1" value="${escapeHtml(ev.title||'')}" placeholder="Event title">
            <input type="color" data-ev-color value="${escapeHtml(ev.color||'#8B6FC9')}" style="width:42px;height:36px;padding:0;border:1px solid var(--line);border-radius:6px;cursor:pointer">
            <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('[data-ev-row]').remove()">×</button>
          </div>
        `).join('')}
      </div>
      <button type="button" class="btn btn-ghost btn-sm" onclick="addEventRow()">+ Add event</button>
    </div>

    <div class="flex gap-8" style="margin-top:18px">
      <button class="btn btn-primary" onclick="saveOfficeDay('${dk}')">Save</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);
}
function addOutRow(){
  const c = document.getElementById('outRows');
  if(!c) return;
  const div = document.createElement('div');
  div.className = 'flex gap-8';
  div.style.cssText = 'margin-bottom:6px;align-items:center';
  div.setAttribute('data-out-row','');
  div.innerHTML = `
    <select class="input" data-out-emp style="flex:0 0 auto;width:110px">
      ${S.employees.map(e=>`<option>${escapeHtml(e)}</option>`).join('')}
    </select>
    <input class="input" data-out-purpose style="flex:1" placeholder="Purpose / location">
    <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('[data-out-row]').remove()">×</button>
  `;
  c.appendChild(div);
}
function addEventRow(){
  const c = document.getElementById('evRows');
  if(!c) return;
  const div = document.createElement('div');
  div.className = 'flex gap-8';
  div.style.cssText = 'margin-bottom:6px;align-items:center';
  div.setAttribute('data-ev-row','');
  div.innerHTML = `
    <input class="input" data-ev-title style="flex:1" placeholder="Event title">
    <input type="color" data-ev-color value="#8B6FC9" style="width:42px;height:36px;padding:0;border:1px solid var(--line);border-radius:6px;cursor:pointer">
    <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('[data-ev-row]').remove()">×</button>
  `;
  c.appendChild(div);
}
function saveOfficeDay(dk){
  const sel = S.employees.filter(e=>document.getElementById('off_'+e)?.checked);
  if(sel.length===0) delete S.officeSchedule[dk];
  else S.officeSchedule[dk] = sel;

  // Collect out-of-office rows
  if(!S.officeOutDays) S.officeOutDays = {};
  const outRows = [...document.querySelectorAll('[data-out-row]')].map(row=>({
    employee: row.querySelector('[data-out-emp]').value,
    purpose: row.querySelector('[data-out-purpose]').value.trim()
  })).filter(r=>r.employee);
  if(outRows.length===0) delete S.officeOutDays[dk];
  else S.officeOutDays[dk] = outRows;

  // Collect custom events
  if(!S.customEvents) S.customEvents = {};
  const evRows = [...document.querySelectorAll('[data-ev-row]')].map(row=>({
    title: row.querySelector('[data-ev-title]').value.trim(),
    color: row.querySelector('[data-ev-color]').value
  })).filter(r=>r.title);
  if(evRows.length===0) delete S.customEvents[dk];
  else S.customEvents[dk] = evRows;

  saveState(); closeModal(); renderPage();
  toast('Calendar day saved','success');
}

/* ---------- SHIPMENT ---------- */
pageRenderers.shipment = (m) => {
  const activeShipments = S.shipments.filter(sh=>sh.status!=='done');
  const doneShipments = S.shipments.filter(sh=>sh.status==='done');

  m.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-sub">Logistics</div>
        <h1 class="page-title editable" data-edit="navLabels.shipment">${escapeHtml(S.navLabels.shipment)}</h1>
      </div>
      ${isManager()?`<button class="btn btn-primary" onclick="addShipment()">+ New Shipment</button>`:''}
    </div>

    ${activeShipments.length===0 && doneShipments.length===0 ? `<div class="empty"><div class="empty-title">No shipments yet</div></div>` : ''}

    ${activeShipments.length > 0 ? `
      <div class="section-title" style="font-size:16px">Active</div>
      ${activeShipments.map(sh => renderShipment(sh)).join('')}
    ` : ''}

    ${doneShipments.length > 0 ? `
      <div class="section-title" style="font-size:16px;margin-top:24px">Completed</div>
      ${doneShipments.map(sh => renderShipment(sh)).join('')}
    ` : ''}
  `;
};

function renderShipment(sh){
  const tpl = S.shipmentTemplate || DEFAULT_STATE.shipmentTemplate;
  const phaseNames = ['p1','p2','p3','p4'].map(k => tpl[k]?.name || `Phase ${k.slice(1)}`);
  const phaseDesc = ['p1','p2','p3','p4'].map(k => tpl[k]?.desc || '');
  const phases = ['p1','p2','p3','p4'];
  const phaseStatus = phases.map((p,i)=>{
    const all = sh.checks[p];
    const done = all.filter(c=>c.d).length;
    return {idx:i+1, total:all.length, done, complete: done===all.length};
  });
  const currentPhase = phaseStatus.find(p=>!p.complete)?.idx || 4;
  const totalSteps = phases.reduce((a,p)=>a+sh.checks[p].length,0);
  const doneSteps = phases.reduce((a,p)=>a+sh.checks[p].filter(c=>c.d).length,0);
  const allDone = doneSteps===totalSteps;

  // Expand state: collapsed if status==='awaiting_confirm' or status==='done', else use user toggle (default expanded for active)
  const isExpanded = window.__shipmentExpanded ? window.__shipmentExpanded[sh.id] !== undefined ? window.__shipmentExpanded[sh.id] : (sh.status!=='done' && sh.status!=='awaiting_confirm') : (sh.status!=='done' && sh.status!=='awaiting_confirm');

  let progress = '';
  for(let i=1;i<=4;i++){
    const ps = phaseStatus[i-1];
    const cls = ps.complete?'done':(i===currentPhase?'active':'');
    progress += `<div class="phase-step"><div class="phase-circle ${cls}">${ps.complete?'✓':i}</div></div>`;
    if(i<4) progress += `<div class="phase-line ${ps.complete?'done':''}"></div>`;
  }

  // Status badge
  let statusBadge = '';
  if(sh.status==='done') statusBadge = `<span class="task-tag" style="background:var(--green-soft);color:var(--green)">✓ Completed</span>`;
  else if(sh.status==='awaiting_confirm') statusBadge = `<span class="task-tag" style="background:var(--orange-soft);color:var(--orange)">⏳ Awaiting Manager confirm</span>`;
  else statusBadge = `<span class="task-tag" style="background:var(--blue-soft);color:var(--blue)">In progress · ${doneSteps}/${totalSteps}</span>`;

  // Today shipping warnings
  const today_ = today();
  const todayShipout = sh.shipOutDate === today_;
  const sevenDaysOut = (() => {
    if(!sh.deliveryDate) return false;
    const d = new Date(sh.deliveryDate);
    const diff = Math.ceil((d - new Date()) / 86400000);
    return diff >= 0 && diff <= 7;
  })();

  return `
    <div class="card mb-16" style="padding:18px;${sh.status==='done'?'opacity:0.7':''}">
      <div class="flex between items-start flex-wrap gap-12">
        <div style="flex:1;min-width:200px">
          <div class="flex gap-8 items-center flex-wrap mb-8">
            <h3 style="font-size:18px;font-weight:600">${escapeHtml(sh.name)}</h3>
            ${statusBadge}
          </div>
          <div class="muted" style="font-size:12px">
            ${sh.handlers && sh.handlers.length ? `Handlers: <strong style="color:var(--gold-dark)">${sh.handlers.map(escapeHtml).join(', ')}</strong>` : '<span style="color:var(--orange)">No handlers assigned</span>'}
          </div>
          <div class="muted" style="font-size:12px;margin-top:2px">
            ${sh.shipOutDate?`📤 Ship out: <strong>${sh.shipOutDate}</strong>${todayShipout?' <span style="color:var(--red)">· TODAY</span>':''}`:''}
            ${sh.shipOutDate && sh.deliveryDate?' · ':''}
            ${sh.deliveryDate?`📥 Delivery: <strong>${sh.deliveryDate}</strong>${sevenDaysOut?' <span style="color:var(--orange)">· within 7 days</span>':''}`:''}
          </div>
        </div>
        <div class="flex gap-8 flex-wrap">
          <button class="btn btn-ghost btn-sm" onclick="toggleShipmentExpand(${sh.id})">${isExpanded?'▲ Collapse':'▼ Expand'}</button>
          ${isManager()?`<button class="btn btn-ghost btn-sm" onclick="editShipmentInfo(${sh.id})">Edit</button>`:''}
          ${isManager()?`<button class="btn btn-ghost btn-sm" onclick="deleteShipment(${sh.id})">Delete</button>`:''}
        </div>
      </div>

      ${!isExpanded ? `
        <div class="phase-progress" style="margin-top:14px">${progress}</div>
        ${sh.status==='awaiting_confirm' && isManager() ? `
          <div class="flex gap-8" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line)">
            <button class="btn btn-primary" onclick="managerConfirmShipment(${sh.id})">✓ Confirm completion</button>
            <button class="btn btn-ghost" onclick="reopenShipment(${sh.id})">Reopen</button>
          </div>
        ` : ''}
      ` : `
        <div class="phase-progress" style="margin-top:14px">${progress}</div>

        ${sh.notes ? `<div class="card" style="background:var(--soft);padding:12px 14px;border:none;margin-bottom:12px">
          <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;margin-bottom:4px">Notes</div>
          <div style="font-size:13px;color:var(--text);white-space:pre-wrap">${escapeHtml(sh.notes)}</div>
        </div>` : ''}

        ${phases.map((p,i)=>{
          const ps = phaseStatus[i];
          const isActive = (i+1)===currentPhase && !ps.complete;
          return `
            <div class="phase-card ${isActive?'active':''}">
              <div class="flex between items-center">
                <div>
                  <h4>Phase ${i+1} · ${phaseNames[i]}</h4>
                  <div class="muted" style="font-size:12px">${phaseDesc[i]}</div>
                </div>
                <div class="muted" style="font-size:13px;font-weight:600">${ps.done}/${ps.total}</div>
              </div>
              <div class="checklist">
                ${sh.checks[p].map((c,ci)=>`
                  <div class="checklist-item ${c.d?'done':''}" style="display:grid;grid-template-columns:24px 1fr auto;gap:10px;align-items:center">
                    <input type="checkbox" id="ship${sh.id}_${p}_${ci}" ${c.d?'checked':''} ${sh.status==='done'?'disabled':''} onchange="toggleShipCheck(${sh.id},'${p}',${ci})">
                    <label for="ship${sh.id}_${p}_${ci}" style="font-size:13px">${escapeHtml(c.t)}</label>
                    <select class="input" style="font-size:11px;padding:4px 8px;width:auto;min-width:90px" onchange="setShipCheckStaff(${sh.id},'${p}',${ci},this.value)" ${sh.status==='done'?'disabled':''}>
                      <option value="">— Staff —</option>
                      ${S.employees.map(e=>`<option ${c.s===e?'selected':''}>${escapeHtml(e)}</option>`).join('')}
                    </select>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('')}

        ${sh.status==='awaiting_confirm' ? `
          <div class="card" style="background:var(--orange-soft);padding:14px;border-color:var(--orange);margin-top:14px">
            <div style="font-weight:600;margin-bottom:8px;color:var(--orange)">⏳ All steps complete — awaiting Manager confirmation</div>
            ${isManager() ? `
              <div class="flex gap-8">
                <button class="btn btn-primary" onclick="managerConfirmShipment(${sh.id})">✓ Confirm — mark Done</button>
                <button class="btn btn-ghost" onclick="reopenShipment(${sh.id})">Reopen for changes</button>
              </div>
            ` : `<div style="font-size:13px;color:var(--text-dim)">Only the Manager can mark this shipment as complete.</div>`}
          </div>
        ` : ''}

        ${sh.status==='done' && isManager() ? `
          <div class="flex gap-8" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line)">
            <button class="btn btn-ghost btn-sm" onclick="reopenShipment(${sh.id})">↩ Reopen</button>
          </div>
        ` : ''}
      `}
    </div>
  `;
}

function toggleShipmentExpand(id){
  if(!window.__shipmentExpanded) window.__shipmentExpanded = {};
  const sh = S.shipments.find(s=>s.id===id);
  const defaultExpanded = sh && sh.status!=='done' && sh.status!=='awaiting_confirm';
  const current = window.__shipmentExpanded[id] !== undefined ? window.__shipmentExpanded[id] : defaultExpanded;
  window.__shipmentExpanded[id] = !current;
  renderPage();
}

function setShipCheckStaff(shipId, phaseKey, idx, staff){
  const sh = S.shipments.find(s=>s.id===shipId);
  if(!sh) return;
  sh.checks[phaseKey][idx].s = staff;
  saveState();
}

function submitShipmentForConfirm(id){
  const sh = S.shipments.find(s=>s.id===id);
  if(!sh) return;
  sh.status = 'awaiting_confirm';
  saveState(); renderPage();
  pushNotif(`Shipment "${sh.name}" submitted for Manager confirmation`);
  toast('Submitted to Manager for confirmation','success');
}

function managerConfirmShipment(id){
  if(!isManager()) return toast('Only Manager can confirm','error');
  const sh = S.shipments.find(s=>s.id===id);
  if(!sh) return;
  sh.status = 'done';
  saveState();
  if(window.__shipmentExpanded) delete window.__shipmentExpanded[id];
  renderPage();
  toast(`Shipment "${sh.name}" marked as Done ✓`,'success');
}

function reopenShipment(id){
  const sh = S.shipments.find(s=>s.id===id);
  if(!sh) return;
  if(!isManager() && sh.status==='done') return toast('Only Manager can reopen a done shipment','error');
  sh.status = 'in_progress';
  saveState(); renderPage();
  toast('Shipment reopened','success');
}

function editShipmentInfo(id){
  if(!isManager()) return;
  const sh = S.shipments.find(s=>s.id===id);
  if(!sh) return;
  const handlers = sh.handlers || [];
  modal(`
    <h3>Edit Shipment</h3>
    <div class="form-row"><label class="label">Shipment name</label><input class="input" id="shName" value="${escapeHtml(sh.name)}"></div>
    <div class="form-row">
      <label class="label">Handlers (select one or more)</label>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;max-height:160px;overflow-y:auto;border:1px solid var(--line);border-radius:6px;padding:8px">
        ${S.employees.map(e=>`
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" data-handler-cb value="${escapeHtml(e)}" ${handlers.includes(e)?'checked':''}>
            <span>${escapeHtml(e)}</span>
          </label>
        `).join('')}

function toggleShipCheck(shipId, phaseKey, idx){
  const sh = S.shipments.find(s=>s.id===shipId);
  if(!sh) return;
  if(sh.status==='done') return;
  sh.checks[phaseKey][idx].d = !sh.checks[phaseKey][idx].d;
  // Auto-set staff to current user if not already set
  if(sh.checks[phaseKey][idx].d && !sh.checks[phaseKey][idx].s && S.currentRole !== 'Manager'){
    sh.checks[phaseKey][idx].s = S.currentRole;
  }
  // Auto-transition: when ALL steps complete → awaiting_confirm
  // When any step un-ticked while in awaiting_confirm → back to in_progress
  const phases = ['p1','p2','p3','p4'];
  const totalSteps = phases.reduce((a,p)=>a+sh.checks[p].length,0);
  const doneSteps = phases.reduce((a,p)=>a+sh.checks[p].filter(c=>c.d).length,0);
  const allDone = doneSteps===totalSteps;

  if(allDone && sh.status==='in_progress'){
    sh.status = 'awaiting_confirm';
    // Auto-collapse to make Manager confirm button prominent
    if(!window.__shipmentExpanded) window.__shipmentExpanded = {};
    window.__shipmentExpanded[shipId] = false;
    // Notify Manager
    S.notifications.push({
      id: Date.now()+Math.random(),
      text: `📦 Shipment "${sh.name}" — all steps complete, awaiting your confirmation`,
      read: false,
      ts: Date.now(),
      forUser: 'Manager'
    });
    saveState(); renderPage();
    if(isManager()){
      toast('All steps complete — confirm to mark Done','success');
    } else {
      toast('All steps complete — submitted to Manager for confirmation','success');
    }
    return;
  }
  if(!allDone && sh.status==='awaiting_confirm'){
    // User un-ticked something while awaiting — revert
    sh.status = 'in_progress';
  }
  saveState(); renderPage();
}

function importInventory(ev){
  const f = ev.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(rows.length===0) throw new Error('Empty file');

      // ADD mode: parse rows and accumulate
      const incoming = {};
      for(const r of rows){
        const id = String(r['Product ID']||r['ProductID']||r['SKU']||'').trim();
        const name = String(r['Product Name']||r['Name']||r['ProductName']||'').trim();
        const type = String(r['Product Type']||r['Type']||'').trim();
        const qty = parseInt(r['Quantity']||r['Qty']||0)||0;
        const wh = String(r['Warehouse']||'').trim();
        if(!id || !wh) continue;
        if(!incoming[id]) incoming[id] = {id, name:name||id, type:type||'Gold', warehouses:{}};
        incoming[id].warehouses[wh] = (incoming[id].warehouses[wh]||0) + qty;
      }
      const incomingIds = Object.keys(incoming);
      if(incomingIds.length===0) throw new Error('No valid rows found. Check column names.');

      // Count what will happen
      let updateCount = 0, newCount = 0, totalAdd = 0;
      for(const id of incomingIds){
        if(S.products.find(p=>p.id===id)) updateCount++;
        else newCount++;
        totalAdd += Object.values(incoming[id].warehouses).reduce((a,b)=>a+b,0);
      }

      if(!confirm(`Add stock from file:\n• ${updateCount} existing product(s) will have quantities ADDED\n• ${newCount} new product(s) will be created\n• Total ${totalAdd} units across all rows\n\nContinue?`)) return;

      for(const id of incomingIds){
        const inc = incoming[id];
        let prod = S.products.find(p=>p.id===id);
        if(!prod){
          prod = {id, name: inc.name, type: inc.type, warehouses:{}};
          S.products.push(prod);
        }else{
          // Optionally update name/type if present in import
          if(inc.name && inc.name !== id) prod.name = inc.name;
          if(inc.type) prod.type = inc.type;
        }
        for(const wh in inc.warehouses){
          prod.warehouses[wh] = (prod.warehouses[wh]||0) + inc.warehouses[wh];
        }
      }

      saveState();
      renderPage();
      toast(`Added stock: ${updateCount} updated, ${newCount} new, +${totalAdd} units`,'success');
    }catch(err){
      toast('Import failed: '+err.message,'error');
      console.error(err);
    }
    ev.target.value='';
  };
  reader.readAsArrayBuffer(f);
}

function saveProduct(idx){
  if(!isManager()) return;
  const isNew = idx===-1;
  const id = $('#pId').value.trim();
  const name = $('#pName').value.trim();
  const type = $('#pType').value;
  if(!id) return toast('Product ID required','error');
  if(!name) return toast('Product name required','error');

  if(isNew){
    // Check duplicate ID
    if(S.products.find(p=>p.id===id)) return toast('Product ID already exists','error');
  }

  // Gather warehouses
  const warehouses = {};
  document.querySelectorAll('[data-wh-row]').forEach(row=>{
    const wName = row.querySelector('[data-wh-name]').value.trim();
    const qty = parseInt(row.querySelector('[data-wh-qty]').value)||0;
    if(wName) warehouses[wName] = qty;
  });

  if(isNew){
    S.products.push({id, name, type, warehouses});
    saveState(); closeModal(); renderPage();
    toast(`Product "${name}" created`,'success');
  } else {
    const p = S.products[idx];
    if(!p) return;
    p.name = name;
    p.type = type;
    p.warehouses = warehouses;
    saveState(); closeModal(); renderPage();
    toast(`Product "${name}" updated`,'success');
  }

function deleteProduct(idx){
  if(!isManager()) return;
  const p = S.products[idx];
  if(!p) return;

  // Check if product is referenced in sales
  const salesUsing = S.sales.filter(s=>s.productId===p.id);
  let msg = `Delete product "${p.name}" (${p.id})?`;
  if(salesUsing.length>0){
    msg += `\n\n${salesUsing.length} past sale${salesUsing.length>1?'s':''} reference this product. They will still display the product name but the product itself will be removed from inventory.`;
  }
  const totalStock = Object.values(p.warehouses).reduce((a,b)=>a+b,0);
  if(totalStock>0){
    msg += `\n\n⚠ Current stock: ${totalStock} units across all warehouses will be lost.`;
  }
  if(!confirm(msg)) return;

  S.products.splice(idx,1);
  saveState(); closeModal(); renderPage();
  toast(`Product "${p.name}" deleted`,'success');
}

/* ---------- WAREHOUSE TRANSFERS ---------- */
// Move stock: from -= qty, to += qty. sign=-1 reverses the movement.
function _applyTransferDelta(productId, from, to, qty, sign){
  const p = S.products.find(pp=>pp.id===productId);
  if(!p) return false;
  if(!p.warehouses) p.warehouses = {};
  p.warehouses[from] = (p.warehouses[from]||0) - sign*qty;
  p.warehouses[to]   = (p.warehouses[to]||0)   + sign*qty;
  return true;
}

function _warehouseNames(){
  return [...new Set([
    ...S.products.flatMap(pp=>Object.keys(pp.warehouses||{})),
    'Online Warehouse',
    ...S.atms.map(a=>a.name)
  ])];
}

function _parseTransferDate(v){
  if(v==='' || v==null) return today();
  if(typeof v === 'number' && window.XLSX && XLSX.SSF){
    const d = XLSX.SSF.parse_date_code(v);
    if(d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  const s = String(v).trim();
  const m = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  return s || today();
}

// Normalize a transfer to an items array (supports old single-product shape)
function _transferItems(t){
  if(t && Array.isArray(t.items)) return t.items;
  if(t && t.productId) return [{productId:t.productId, qty:t.qty||0}];
  return [];
}
// Apply/reverse every line in a transfer
function _applyTransferAll(t, sign){
  _transferItems(t).forEach(it=>_applyTransferDelta(it.productId, t.from, t.to, it.qty, sign));
}
// Build <option> list for a product dropdown
function _transferProductOptions(sel){
  const typeOrder = {Gold:1, Silver:2, Keychain:3};
  const prods = [...S.products].sort((a,b)=>{
    const ta=typeOrder[a.type]||99, tb=typeOrder[b.type]||99;
    if(ta!==tb) return ta-tb;
    return String(a.id).localeCompare(String(b.id));
  });
  return `<option value="">— Select product —</option>` +
    prods.map(p=>`<option value="${escapeHtml(p.id)}" ${sel===p.id?'selected':''}>${escapeHtml(p.id)} — ${escapeHtml(p.name)} (${escapeHtml(p.type)})</option>`).join('');
}

// Read product lines from the modal DOM; merges duplicate products
function _readTransferItemsFromDOM(){
  const items = [], seen = {};
  let badQty = false;
  document.querySelectorAll('[data-tr-item]').forEach(row=>{
    const pid = row.querySelector('[data-tr-pid]').value;
    const q = parseInt(row.querySelector('[data-tr-qty]').value)||0;
    if(!pid) return;
    if(q<=0){ badQty = true; return; }
    if(seen[pid]!==undefined){ items[seen[pid]].qty += q; }
    else { seen[pid] = items.length; items.push({productId:pid, qty:q}); }
  });
  return {items, badQty};
}

function saveTransfer(idx){
  if(!isManager()) return;
  const isNew = idx===-1;
  const from = $('#trFrom').value;
  const to = $('#trTo').value;
  const date = $('#trDate').value || today();
  const note = $('#trNote').value.trim();

  if(!from || !to) return toast('Select both From and To warehouses','error');
  if(from===to) return toast('From and To must be different','error');

  const {items, badQty} = _readTransferItemsFromDOM();
  if(badQty) return toast('Each product line needs a quantity greater than 0','error');
  if(items.length===0) return toast('Add at least one product','error');
  for(const it of items){
    if(!S.products.find(p=>p.id===it.productId)) return toast('Product not found: '+it.productId,'error');
  }

  // Reverse the old transfer first (editing) so availability reflects corrected balances
  const old = isNew ? null : S.transfers[idx];
  if(old) _applyTransferAll(old, -1);

  // Cumulative availability check per product in the source warehouse
  const neg = [];
  items.forEach(it=>{
    const p = S.products.find(pp=>pp.id===it.productId);
    const avail = (p.warehouses[from]||0);
    if(avail < it.qty) neg.push(`${it.productId}: have ${avail}, moving ${it.qty}`);
  });
  if(neg.length){
    if(!confirm(`⚠ Some products exceed available stock in "${from}" and will go negative:\n${neg.join('\n')}\n\nProceed anyway?`)){
      if(old) _applyTransferAll(old, 1); // restore
      return;
    }
  }

  const t = old || {};
  t.from = from; t.to = to; t.date = date; t.note = note; t.items = items;
  delete t.productId; delete t.qty; // remove any legacy single-product fields

  if(isNew){
    t.id = 'TR-' + String(S.transferIdSeq++).padStart(4,'0');
    t.createdBy = S.currentRole; t.createdAt = Date.now();
    S.transfers.push(t);
  }
  _applyTransferAll(t, 1);

  const totalQty = items.reduce((a,it)=>a+it.qty,0);
  pushAuditLog(isNew?'transfer.create':'transfer.edit', `${items.length} product(s), ${totalQty} units: ${from} -> ${to}`);
  saveState(); closeModal(); renderPage();
  toast(isNew?`Transferred ${items.length} product(s) (${totalQty} units): ${from} → ${to}`:'Transfer updated','success');
}

function deleteTransfer(idx){
  if(!isManager()) return;
  const t = S.transfers[idx];
  if(!t) return;
  const items = _transferItems(t);
  const totalQty = items.reduce((a,it)=>a+it.qty,0);
  if(!confirm(`Delete transfer ${t.id}?\n${items.length} product(s), ${totalQty} units: ${t.from} → ${t.to}\n\nStock will move back (${t.to} → ${t.from}).`)) return;
  _applyTransferAll(t, -1);
  S.transfers.splice(idx,1);
  pushAuditLog('transfer.delete', `${items.length} product(s), ${totalQty} units: ${t.from} -> ${t.to}`);
  saveState(); closeModal(); renderPage();
  toast('Transfer deleted, stock restored','success');
}

function downloadTransferTemplate(){

  const data = [
    ['Product ID','From','To','Quantity','Date','Note'],

    ['G-002','Online Warehouse','MBK Center',5,d,'monthly refill'],

  ];
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();

function importTransfers(ev){
  const f = ev.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(rows.length===0) throw new Error('Empty file');

      const parsed = [], errors = [];
      rows.forEach((r,i)=>{
        const rowNum = i+2;
        const productId = String(r['Product ID']||r['ProductID']||r['SKU']||'').trim();
        const from = String(r['From']||r['From Warehouse']||r['FromWarehouse']||'').trim();
        const to = String(r['To']||r['To Warehouse']||r['ToWarehouse']||'').trim();
        const qty = parseInt(r['Quantity']||r['Qty']||0)||0;
        const date = _parseTransferDate(r['Date']);
        const note = String(r['Note']||'').trim();
        if(!productId && !from && !to && !qty) return; // blank row
        if(!productId){ errors.push(`Row ${rowNum}: missing Product ID`); return; }
        if(!S.products.find(p=>p.id===productId)){ errors.push(`Row ${rowNum}: product "${productId}" not found`); return; }
        if(!from || !to){ errors.push(`Row ${rowNum}: missing From/To`); return; }
        if(from===to){ errors.push(`Row ${rowNum}: From and To are identical`); return; }
        if(qty<=0){ errors.push(`Row ${rowNum}: quantity must be > 0`); return; }
        parsed.push({productId, from, to, qty, date, note});
      });

      if(parsed.length===0){
        throw new Error('No valid transfers found.' + (errors.length?'\n\n'+errors.slice(0,8).join('\n'):''));
      }

      // Group rows sharing From + To + Date into one transfer with multiple products
      const groups = {};
      parsed.forEach(r=>{
        const key = r.from+'||'+r.to+'||'+r.date;
        if(!groups[key]){ groups[key] = {from:r.from, to:r.to, date:r.date, note:r.note, items:[], _seen:{}}; }
        const g = groups[key];
        if(g._seen[r.productId]!==undefined){ g.items[g._seen[r.productId]].qty += r.qty; }
        else { g._seen[r.productId] = g.items.length; g.items.push({productId:r.productId, qty:r.qty}); }
        if(!g.note && r.note) g.note = r.note;
      });
      const groupList = Object.values(groups);

      let msg = `Create ${groupList.length} transfer(s) from ${parsed.length} row(s)?`;
      if(errors.length) msg += `\n\n${errors.length} row(s) will be skipped:\n${errors.slice(0,6).join('\n')}${errors.length>6?'\n…':''}`;

      // Cumulative negative pre-check per product per source warehouse
      const sim = {}, negWarn = [];
      groupList.forEach(g=>{
        g.items.forEach(it=>{
          const key = it.productId+'|'+g.from;
          const p = S.products.find(pp=>pp.id===it.productId);
          if(sim[key]===undefined) sim[key] = (p.warehouses[g.from]||0);
          sim[key] -= it.qty;
          if(sim[key] < 0) negWarn.push(`${it.productId} @ ${g.from}`);
        });
      });
      if(negWarn.length){
        msg += `\n\n⚠ Some transfers exceed available stock and will make these go negative:\n${[...new Set(negWarn)].slice(0,6).join('\n')}`;
      }
      if(!confirm(msg)) { ev.target.value=''; return; }

      groupList.forEach(g=>{
        const t = {id:'TR-'+String(S.transferIdSeq++).padStart(4,'0'), from:g.from, to:g.to, date:g.date, note:g.note, items:g.items, createdBy:S.currentRole, createdAt:Date.now()};
        _applyTransferAll(t, 1);
        S.transfers.push(t);
      });
      pushAuditLog('transfer.import', `${groupList.length} transfers (${parsed.length} rows) from Excel`);
      saveState(); renderPage();
      toast(`Created ${groupList.length} transfer(s) from ${parsed.length} row(s)${errors.length?`, ${errors.length} skipped`:''}`,'success');
    }catch(err){
      toast('Import failed: '+err.message,'error');
      console.error(err);
    }
    ev.target.value='';
  };
  reader.readAsArrayBuffer(f);
}

      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);

function saveATM(idx){
  const name = $('#aName').value.trim();
  if(!name) return toast('Name required','error');
  const pms = [];
  if($('#pm_goldpay').checked) pms.push('Goldpay.sg');
  if($('#pm_card').checked) pms.push('Card');
  if($('#pm_qr').checked) pms.push('Thai QR');
  if(pms.length===0) return toast('Select at least one payment method','error');
  const obj = {
    name, status:$('#aStatus').value,
    stock: parseInt($('#aStock').value)||0,
    paymentMethods: pms,
    lastCheck: Date.now()
  };
  if(idx===-1){
    obj.id = S.atmIdSeq++;
    S.atms.push(obj);
    S.products.forEach(p=>{ if(!(name in p.warehouses)) p.warehouses[name]=0; });
  }else{
    S.atms[idx] = {...S.atms[idx], ...obj};
  }
  saveState(); closeModal(); renderPage(); toast('ATM saved','success');
}
function deleteATM(idx){
  const atm = S.atms[idx];
  if(!atm) return;
  const totalStock = S.products.reduce((s,p)=>s+(p.warehouses[atm.name]||0),0);
  let msg = `Delete "${atm.name}"?`;
  if(totalStock>0){
    msg += `\n\nThis ATM still has ${totalStock} pcs of stock. The warehouse will be removed from all products.`;
  }
  if(!confirm(msg)) return;
  // Remove warehouse from all products
  S.products.forEach(p=>{ delete p.warehouses[atm.name]; });
  S.atms.splice(idx,1);
  saveState(); closeModal(); renderPage();
  toast(`ATM "${atm.name}" deleted`,'success');
}

function timeSince(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return s+'s';
  if(s<3600) return Math.floor(s/60)+'m';
  if(s<86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}

// Safe linkifier: converts http(s):// URLs to clickable links, escapes everything else
function linkifyText(str){
  const escaped = escapeHtml(String(str||''));
  return escaped.replace(/(https?:\/\/[^\s<>"]+[^\s<>".,;:!?)\]])/g, url => {
    return `<a href="${url}" target="_blank" rel="noopener" style="color:var(--gold-dark);text-decoration:underline">${url}</a>`;
  });
}

function openModuleEditor(id){
  if(!isManager()) return;
  const isNew = id === -1;
  const mod = isNew
    ? { title:'', desc:'', steps:[{title:'',desc:'',tip:''}] }
    : S.learningModules.find(x => x.id === id);
  if(!mod) return;

  // Use a unique window-scope buffer to manage step state inside the modal
  window.__moduleEditorBuf = {
    id: isNew ? -1 : id,
    title: mod.title || '',
    desc: mod.desc || '',
    steps: JSON.parse(JSON.stringify(mod.steps || []))
  };

  renderModuleEditor();
}

function renderModuleEditor(){
  const buf = window.__moduleEditorBuf;
  if(!buf) return;
  const isNew = buf.id === -1;

  modal(`
    <div style="max-width:560px">
      <h3>${isNew?'Add New Module':'Edit Module'}</h3>

      <div class="form-row">
        <label class="label">Module Title</label>
        <input class="input" id="modTitle" value="${escapeHtml(buf.title)}" placeholder="e.g. Restock Gold ATM" oninput="window.__moduleEditorBuf.title=this.value">
      </div>

      <div class="form-row">
        <label class="label">Short Description</label>
        <input class="input" id="modDesc" value="${escapeHtml(buf.desc)}" placeholder="Brief description shown on the card" oninput="window.__moduleEditorBuf.desc=this.value">
      </div>

      <div class="form-row">
        <label class="label">Steps</label>
        <div id="modStepsEditor">
          ${buf.steps.map((s,i) => stepEditorHtml(i,s)).join('')}
        </div>

      </div>

      <div class="flex gap-8" style="margin-top:18px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="saveLearningModule()">${isNew?'Create Module':'Save Changes'}</button>

      </div>
    </div>
  `);

  // Re-attach all listeners after modal HTML is fresh — modal() replaces content
  setTimeout(attachModuleStepListeners, 0);
}

function stepEditorHtml(i, s){
  return `
    <div class="lib-step-edit" data-step-idx="${i}" style="background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px;position:relative">
      <div class="flex between items-center mb-8">
        <div style="font-size:11px;font-weight:600;color:var(--gold-dark);text-transform:uppercase;letter-spacing:0.1em">Step ${i+1}</div>
        <button class="btn btn-ghost btn-sm" onclick="removeModuleStep(${i})" title="Remove step" style="padding:2px 8px;font-size:14px">✕</button>
      </div>
      <div class="form-row" style="margin-bottom:8px">
        <label class="label">Title</label>
        <input class="input step-title-inp" value="${escapeHtml(s.title||'')}" placeholder="Step title">
      </div>
      <div class="form-row" style="margin-bottom:8px">
        <label class="label">Description</label>
        <textarea class="input step-desc-inp" style="min-height:70px" placeholder="Detailed instructions...">${escapeHtml(s.desc||'')}</textarea>
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label class="label">Tip / Note (optional)</label>
        <input class="input step-tip-inp" value="${escapeHtml(s.tip||'')}" placeholder="Optional reminder, link, or tip">
      </div>
    </div>
  `;
}

function attachModuleStepListeners(){
  document.querySelectorAll('.lib-step-edit').forEach(el => {
    const idx = parseInt(el.dataset.stepIdx, 10);
    const t = el.querySelector('.step-title-inp');
    const d = el.querySelector('.step-desc-inp');
    const p = el.querySelector('.step-tip-inp');
    if(t) t.oninput = () => { if(window.__moduleEditorBuf?.steps[idx]) window.__moduleEditorBuf.steps[idx].title = t.value; };
    if(d) d.oninput = () => { if(window.__moduleEditorBuf?.steps[idx]) window.__moduleEditorBuf.steps[idx].desc = d.value; };
    if(p) p.oninput = () => { if(window.__moduleEditorBuf?.steps[idx]) window.__moduleEditorBuf.steps[idx].tip = p.value; };
  });
}

function addModuleStep(){
  if(!window.__moduleEditorBuf) return;
  // Capture current values from inputs before re-rendering
  captureModuleEditorValues();
  window.__moduleEditorBuf.steps.push({title:'',desc:'',tip:''});
  renderModuleEditor();
}

function removeModuleStep(idx){
  if(!window.__moduleEditorBuf) return;
  captureModuleEditorValues();
  window.__moduleEditorBuf.steps.splice(idx, 1);
  if(window.__moduleEditorBuf.steps.length === 0){
    window.__moduleEditorBuf.steps.push({title:'',desc:'',tip:''});
  }
  renderModuleEditor();
}

function captureModuleEditorValues(){
  const buf = window.__moduleEditorBuf;
  if(!buf) return;
  const t = document.getElementById('modTitle');
  const d = document.getElementById('modDesc');
  if(t) buf.title = t.value;
  if(d) buf.desc = d.value;
  document.querySelectorAll('.lib-step-edit').forEach(el => {
    const idx = parseInt(el.dataset.stepIdx, 10);
    if(buf.steps[idx]){
      buf.steps[idx].title = el.querySelector('.step-title-inp')?.value || '';
      buf.steps[idx].desc = el.querySelector('.step-desc-inp')?.value || '';
      buf.steps[idx].tip = el.querySelector('.step-tip-inp')?.value || '';
    }
  });
}

function saveLearningModule(){
  if(!isManager()) return;
  const buf = window.__moduleEditorBuf;
  if(!buf) return;

  captureModuleEditorValues();

  const title = (buf.title || '').trim();
  if(!title){ toast('Module title is required','error'); return; }

  // Filter out completely empty steps; keep steps that have any content
  const steps = buf.steps
    .map(s => ({
      title: (s.title||'').trim(),
      desc: (s.desc||'').trim(),
      tip: (s.tip||'').trim()
    }))
    .filter(s => s.title || s.desc);

  if(buf.id === -1){
    // Create new
    if(!S.learningModuleIdSeq) S.learningModuleIdSeq = 1;
    const newMod = {
      id: S.learningModuleIdSeq++,
      title,
      desc: (buf.desc||'').trim(),
      steps
    };
    if(!Array.isArray(S.learningModules)) S.learningModules = [];
    S.learningModules.push(newMod);
    window.__libOpenId = newMod.id;
    toast('Module created','success');
  } else {
    // Update existing
    const mod = S.learningModules.find(x => x.id === buf.id);
    if(mod){
      mod.title = title;
      mod.desc = (buf.desc||'').trim();
      mod.steps = steps;
      toast('Module updated','success');
    }
  }

  window.__moduleEditorBuf = null;
  saveState();
  closeModal();
  renderPage();
}

function deleteLearningModule(id){
  if(!isManager()) return;
  if(!confirm('Delete this module? This cannot be undone.')) return;
  S.learningModules = (S.learningModules||[]).filter(m => m.id !== id);
  if(window.__libOpenId === id) window.__libOpenId = null;
  saveState();
  renderPage();
  toast('Module deleted');
}

function deleteLearningModuleFromEditor(){
  if(!isManager()) return;
  const buf = window.__moduleEditorBuf;
  if(!buf || buf.id === -1) return;
  if(!confirm('Delete this module? This cannot be undone.')) return;
  S.learningModules = (S.learningModules||[]).filter(m => m.id !== buf.id);
  if(window.__libOpenId === buf.id) window.__libOpenId = null;
  window.__moduleEditorBuf = null;
  saveState();
  closeModal();
  renderPage();
  toast('Module deleted');
}

        const sevColor = c.severity==='high'?'var(--red)':(c.severity==='medium'?'var(--orange)':'var(--green)');
        const sevBg = c.severity==='high'?'var(--red-soft)':(c.severity==='medium'?'var(--orange-soft)':'var(--green-soft)');
        return `
          <div class="card mb-16" onclick="openCaseView(${c.id})" style="cursor:pointer;border-left:3px solid ${sevColor}">

              <div style="flex:1">
                <div style="font-size:18px;font-weight:600;margin-bottom:4px">${escapeHtml(c.title)}</div>

};

function openCaseView(id){
  const c = S.caseStudies.find(x=>x.id===id);
  if(!c) return;
  const sevColor = c.severity==='high'?'var(--red)':(c.severity==='medium'?'var(--orange)':'var(--green)');
  const sevBg = c.severity==='high'?'var(--red-soft)':(c.severity==='medium'?'var(--orange-soft)':'var(--green-soft)');
  modal(`
    <div style="max-width:600px">
      <span class="task-tag" style="background:${sevBg};color:${sevColor};margin-bottom:10px;display:inline-block">${escapeHtml(c.severity||'medium')} severity</span>
      <h3 style="font-size:22px;line-height:1.3;margin-bottom:8px">${escapeHtml(c.title)}</h3>
      <div class="muted" style="font-size:12px;margin-bottom:18px">by ${escapeHtml(c.author)} · ${new Date(c.date).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>

      <div class="card" style="background:var(--soft);padding:14px;margin-bottom:14px">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);font-weight:700;margin-bottom:6px">Situation</div>
        <div style="font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap">${escapeHtml(c.situation)}</div>
      </div>

      <div class="card" style="background:var(--gold-soft);padding:14px;margin-bottom:14px">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold-dark);font-weight:700;margin-bottom:6px">Resolution steps</div>
